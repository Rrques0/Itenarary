<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chromatic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080810;--surf:#0f0f1a;--raise:#17172a;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
  --txt:#eeeaf2;--sub:rgba(238,234,242,.48);--dim:rgba(238,234,242,.22);
  --ac:#c8b8f8;--acg:rgba(200,184,248,.14);
  --grn:#4ade80;--grng:rgba(74,222,128,.12);
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);overflow:hidden}

#app{
  width:100%;height:100dvh;max-width:440px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%,var(--amb1,rgba(26,18,58,.7)) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,var(--amb2,rgba(200,184,248,.08)) 0%,transparent 55%),
    var(--bg);
}
@media(min-width:440px){#app{border-left:1px solid var(--line);border-right:1px solid var(--line)}}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;flex-shrink:0;gap:8px}
.wordmark{font-family:var(--serif);font-size:19px;letter-spacing:-.3px;background:linear-gradient(135deg,var(--txt),var(--sub));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0}
.tb-pills{display:flex;gap:6px}
.pill{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:30px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--sub);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap;-webkit-appearance:none}
.pill svg{width:12px;height:12px;display:block;flex-shrink:0}
.pill:hover,.pill:active{border-color:var(--line2);color:var(--txt);background:rgba(255,255,255,.07)}
.pill.on{border-color:rgba(200,184,248,.45);color:var(--ac);background:var(--acg)}

/* TABS */
#tabs{display:flex;padding:13px 20px 0;gap:2px;flex-shrink:0}
.tab{padding:7px 14px;border-radius:30px;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);cursor:pointer;border:none;background:none;font-family:var(--sans);transition:all .2s;white-space:nowrap;-webkit-appearance:none}
.tab:active{opacity:.7}
.tab.on{background:var(--raise);color:var(--txt)}

/* PAGES */
#pages{flex:1;position:relative;overflow:hidden}
.page{display:none;flex-direction:column;width:100%;height:100%;padding:0 20px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.page::-webkit-scrollbar{display:none}
.page.on{display:flex}

/* ══ NOW PLAYING ══ */
#coverSection{padding-top:18px;flex-shrink:0;position:relative}
#coverWrap{width:100%;aspect-ratio:1/1;border-radius:20px;overflow:hidden;position:relative;box-shadow:0 32px 72px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);transition:transform .4s var(--ease),box-shadow .4s var(--ease)}
.playing #coverWrap{transform:scale(1.012);box-shadow:0 44px 90px rgba(0,0,0,.68),0 0 0 1px rgba(255,255,255,.08),0 0 60px var(--acg)}
#coverImg{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .45s,transform .45s}
#coverImg.swap{opacity:0;transform:scale(.96)}
#coverSheen{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 45%,rgba(0,0,0,.1) 100%);pointer-events:none}
#loadOverlay{position:absolute;inset:0;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(8,8,16,.78);backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .25s;z-index:2}
#loadOverlay.show{opacity:1}
.spinner{width:28px;height:28px;border:2px solid var(--raise);border-top-color:var(--ac);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-lbl{font-size:11px;color:var(--sub);letter-spacing:1.5px}

#trackInfo{padding:16px 0 0;flex-shrink:0}
.ti-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ti-text{flex:1;min-width:0}
#tTitle{font-family:var(--serif);font-size:clamp(20px,5.5vw,26px);line-height:1.15;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tArtist{font-size:14px;color:var(--sub);margin-top:5px}
#likeBtn{width:38px;height:38px;flex-shrink:0;border-radius:50%;border:1px solid var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;color:var(--dim);-webkit-appearance:none}
#likeBtn:hover,#likeBtn:active{border-color:var(--ac);color:var(--ac)}
#likeBtn.on{border-color:var(--ac);color:var(--ac);background:var(--acg)}
#likeBtn svg{width:16px;height:16px;display:block}
.chips{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;border:1px solid var(--line);color:var(--dim);white-space:nowrap}
.chip.hi{border-color:rgba(200,184,248,.3);color:var(--ac);background:var(--acg)}

#wvSection{padding-top:14px;flex-shrink:0}
#wvCvs{width:100%;height:44px;display:block;cursor:pointer;border-radius:3px}

#progSection{padding-top:8px;flex-shrink:0}
#progRail{width:100%;height:20px;display:flex;align-items:center;cursor:pointer;touch-action:none;position:relative}
#progTrack{width:100%;height:3px;background:var(--raise);border-radius:2px;position:relative;overflow:visible}
#progBar{height:100%;border-radius:2px;background:var(--ac);transition:width .08s linear;position:relative;max-width:100%}
#progHead{position:absolute;right:-6px;top:-5px;width:13px;height:13px;border-radius:50%;background:var(--txt);box-shadow:0 0 0 3px var(--bg),0 0 0 4.5px var(--ac);opacity:0;transition:opacity .18s;pointer-events:none}
#progRail:hover #progHead{opacity:1}
.prog-times{display:flex;justify-content:space-between;margin-top:2px;font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.5px}

#controls{display:flex;align-items:center;justify-content:space-between;padding-top:16px;flex-shrink:0}
.ci{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);width:44px;height:44px;border-radius:50%;flex-shrink:0;transition:color .18s,transform .12s;-webkit-appearance:none}
.ci:hover{color:var(--txt)}
.ci:active{color:var(--txt);transform:scale(.88)}
.ci.on{color:var(--ac)}
.ci svg{display:block}
#playBtn{width:64px;height:64px;border-radius:50%;background:var(--txt);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--bg);box-shadow:0 8px 28px rgba(0,0,0,.45);transition:transform .12s var(--ease),box-shadow .3s var(--ease),background .4s;-webkit-appearance:none}
#playBtn:active{transform:scale(.92)}
#playBtn:hover{transform:scale(1.06);box-shadow:0 12px 38px rgba(0,0,0,.5),0 0 0 12px var(--acg)}
.playing #playBtn{background:var(--ac);color:#08080f;box-shadow:0 8px 36px rgba(200,184,248,.4)}
.playing #playBtn:hover{box-shadow:0 12px 48px rgba(200,184,248,.55),0 0 0 14px var(--acg)}
#playBtn svg{width:26px;height:26px;display:block}

#volRow{display:flex;align-items:center;gap:10px;padding-top:14px;flex-shrink:0}
.vi{color:var(--dim);flex-shrink:0;display:flex;align-items:center}
.vi svg{width:16px;height:16px;display:block}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:linear-gradient(to right,var(--ac) calc(var(--p,85)*1%),var(--raise) calc(var(--p,85)*1%));cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--txt);cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.4)}
.vv{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:22px;text-align:right;flex-shrink:0}

/* ══ LIBRARY ══ */
#pgLib{padding-top:16px;gap:0}
.lib-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0;gap:10px}
.lib-title{font-family:var(--serif);font-size:21px;flex-shrink:0}
/* ADD FILES button in library header */
.lib-add{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid rgba(200,184,248,.3);background:var(--acg);color:var(--ac);font-family:var(--sans);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-appearance:none;transition:all .18s;flex-shrink:0}
.lib-add:hover,.lib-add:active{background:rgba(200,184,248,.22);border-color:rgba(200,184,248,.5)}
.lib-add svg{width:12px;height:12px;display:block}
.lib-ct{font-family:var(--mono);font-size:11px;color:var(--dim);flex-shrink:0}
.srch-wrap{position:relative;flex-shrink:0;margin-bottom:10px}
.srch{width:100%;background:var(--raise);border:1px solid var(--line);border-radius:30px;padding:10px 16px 10px 40px;color:var(--txt);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.srch:focus{border-color:rgba(255,255,255,.2)}
.srch::placeholder{color:var(--dim)}
.srch-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none;display:flex}
.srch-ico svg{width:15px;height:15px;display:block}
.trk-list{display:flex;flex-direction:column;gap:1px}
.trk-row{display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;cursor:pointer;transition:background .18s;min-height:64px}
.trk-row:hover,.trk-row:active{background:var(--raise)}
.trk-row.on{background:rgba(200,184,248,.07)}
.trk-row.on .trk-name{color:var(--ac)}
.trk-n{font-family:var(--mono);font-size:11px;color:var(--dim);width:20px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.trk-n svg{width:13px;height:13px;display:block}
.trk-art{width:46px;height:46px;border-radius:10px;flex-shrink:0;object-fit:cover;display:block;box-shadow:0 4px 14px rgba(0,0,0,.35);background:var(--raise)}
.trk-info{flex:1;min-width:0}
.trk-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.trk-meta{font-size:11px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trk-dur{font-family:var(--mono);font-size:11px;color:var(--dim);flex-shrink:0}
.trk-del{background:none;border:none;color:var(--dim);cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s;opacity:0;-webkit-appearance:none}
.trk-row:hover .trk-del{opacity:1}
.trk-del:hover{color:var(--red,#f87171)}
.trk-del svg{width:14px;height:14px;display:block}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px 0;text-align:center;flex:1}
.empty svg{width:44px;height:44px;color:var(--dim);opacity:.5}
.empty p{font-size:13px;color:var(--sub);line-height:1.7}
.empty-add{display:flex;align-items:center;gap:6px;padding:10px 20px;border-radius:20px;border:1px solid rgba(200,184,248,.3);background:var(--acg);color:var(--ac);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none;transition:all .18s;margin-top:4px}
.empty-add:hover,.empty-add:active{background:rgba(200,184,248,.22)}
.empty-add svg{width:16px;height:16px;display:block}

/* MINI PLAYER */
#mini{margin:0 10px 10px;border-radius:16px;background:rgba(14,14,24,.94);border:1px solid var(--line);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;flex-shrink:0;position:relative}
#mini.hidden{display:none}
.mp-art{width:40px;height:40px;border-radius:8px;flex-shrink:0;object-fit:cover;box-shadow:0 4px 12px rgba(0,0,0,.4);background:var(--raise)}
.mp-info{flex:1;min-width:0}
.mp-t{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-a{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mp-ctrls{display:flex;align-items:center;gap:2px;flex-shrink:0}
.mp-btn{background:none;border:none;cursor:pointer;color:var(--sub);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color .15s;-webkit-appearance:none}
.mp-btn:hover,.mp-btn:active{color:var(--txt)}
.mp-btn svg{width:19px;height:19px;display:block}
.mp-prog{position:absolute;bottom:0;left:14px;right:14px;height:2px;background:var(--raise);border-radius:1px;overflow:hidden}
.mp-fill{height:100%;background:var(--ac);border-radius:1px;transition:width .1s linear}

/* TOAST */
#toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(4px);z-index:50;padding:9px 20px;border-radius:30px;background:var(--raise);border:1px solid var(--line2);color:var(--txt);font-size:11px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* PROCESSING INDICATOR */
#processing{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;padding:9px 20px;border-radius:30px;background:var(--raise);border:1px solid var(--line2);color:var(--sub);font-size:11px;display:none;align-items:center;gap:8px;white-space:nowrap;pointer-events:none}
#processing.show{display:flex}
#processing .spinner{width:14px;height:14px;border-width:1.5px}
</style>
</head>
<body>

<!-- Hidden file inputs -->
<input type="file" id="filePickerAudio" multiple accept="audio/*,.flac,.wav,.mp3,.m4a,.aac,.ogg,.opus" style="display:none" onchange="addFiles(this.files)">
<input type="file" id="filePickerFolder" multiple webkitdirectory style="display:none" onchange="addFiles(this.files)">



<div id="app">

  <div id="topbar">
    <div class="wordmark">Chromatic</div>
    <div class="tb-pills">
      <button class="pill" id="pillShuffle" onclick="togShuffle()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20l16-16M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        Shuffle
      </button>
      <button class="pill" id="pillRepeat" onclick="togRepeat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        Repeat
      </button>
    </div>
  </div>

  <div id="tabs">
    <button class="tab on" onclick="goTab('Now',this)">Now Playing</button>
    <button class="tab"    onclick="goTab('Lib',this)">Library</button>
  </div>

  <div id="pages">

    <!-- NOW PLAYING -->
    <div class="page on" id="pgNow">
      <div id="coverSection">
        <div id="coverWrap">
          <img id="coverImg" src="" alt="Cover art">
          <div id="coverSheen"></div>
          <div id="loadOverlay"><div class="spinner"></div><div class="load-lbl">LOADING</div></div>
        </div>
      </div>
      <div id="trackInfo">
        <div class="ti-top">
          <div class="ti-text">
            <div id="tTitle">No track selected</div>
            <div id="tArtist">Go to Library and add your music files</div>
          </div>
          <button id="likeBtn" onclick="togLike()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          </button>
        </div>
        <div class="chips" id="chips"></div>
      </div>
      <div id="wvSection"><canvas id="wvCvs" onclick="wvSeek(event)"></canvas></div>
      <div id="progSection">
        <div id="progRail" ontouchstart="seekT(event)" ontouchmove="seekT(event)" onclick="seekC(event)">
          <div id="progTrack"><div id="progBar" style="width:0%"><div id="progHead"></div></div></div>
        </div>
        <div class="prog-times"><span id="tNow">0:00</span><span id="tTot">0:00</span></div>
      </div>
      <div id="controls">
        <button class="ci" id="ciShuffle" onclick="togShuffle()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20l16-16M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        </button>
        <button class="ci" onclick="prevTrk()">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="playBtn" onclick="togglePlay()">
          <svg id="playIco" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button class="ci" onclick="nextTrk()">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ci" id="ciRepeat" onclick="togRepeat()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        </button>
      </div>
      <div id="volRow">
        <div class="vi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg></div>
        <input type="range" id="volSl" min="0" max="100" value="85" oninput="setVol(this.value)">
        <div class="vi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14"/></svg></div>
        <span class="vv" id="vv">85</span>
      </div>
    </div>

    <!-- LIBRARY -->
    <div class="page" id="pgLib">
      <div class="lib-hdr">
        <div class="lib-title">Library</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="lib-ct" id="libCt"></div>
          <button class="lib-add" onclick="showAddMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Files
          </button>
        </div>
      </div>
      <!-- add menu -->
      <div id="addMenu" style="display:none;flex-shrink:0;background:var(--surf);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:10px">
        <button onclick="pickFiles()" style="width:100%;padding:13px 16px;background:none;border:none;border-bottom:1px solid var(--line);color:var(--txt);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;-webkit-appearance:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          Pick audio files
          <span style="margin-left:auto;font-size:11px;color:var(--dim)">MP3 · FLAC · WAV · AAC</span>
        </button>
        <button onclick="pickFolder()" style="width:100%;padding:13px 16px;background:none;border:none;color:var(--txt);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;-webkit-appearance:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          Pick entire folder
          <span style="margin-left:auto;font-size:11px;color:var(--dim)">or NAS drive</span>
        </button>
      </div>
      <div class="srch-wrap">
        <div class="srch-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
        <input class="srch" id="srchIn" placeholder="Search tracks, artists, albums…" oninput="renderLib(this.value)">
      </div>
      <div id="trkList" class="trk-list"></div>
    </div>

  </div><!-- /pages -->

  <!-- MINI PLAYER -->
  <div id="mini" class="hidden" onclick="goTab('Now',document.querySelector('.tab'))">
    <img class="mp-art" id="mpArt" src="" alt="">
    <div class="mp-info">
      <div class="mp-t" id="mpT">—</div>
      <div class="mp-a" id="mpA">—</div>
    </div>
    <div class="mp-ctrls">
      <button class="mp-btn" onclick="event.stopPropagation();prevTrk()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="mp-btn" onclick="event.stopPropagation();togglePlay()"><svg id="mpIco" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>
      <button class="mp-btn" onclick="event.stopPropagation();nextTrk()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
    <div class="mp-prog"><div class="mp-fill" id="mpFill" style="width:0%"></div></div>
  </div>

  <!-- TOAST + PROCESSING — inside app, pointer-events:none always -->
  <div id="toast" style="pointer-events:none"></div>
  <div id="processing" style="pointer-events:none"><div class="spinner"></div><span id="processingTxt">Reading files...</span></div>
</div><!-- /app -->

<script>
/* ─────────────────────────────────────────
   ID3 / METADATA PARSER
   Handles ID3v2, ID3v1, FLAC, M4A/AAC
───────────────────────────────────────── */
const MetaParser = (() => {
  function u8(buf,off){return new Uint8Array(buf)[off]}
  function u32be(buf,off){return new DataView(buf).getUint32(off,false)}
  function u32le(buf,off){return new DataView(buf).getUint32(off,true)}
  function latin1(bytes){return Array.from(bytes).map(b=>String.fromCharCode(b)).join('').replace(/\0/g,'')}
  function decodeStr(bytes){
    if(!bytes.length)return'';
    if(bytes[0]===0x03)return new TextDecoder('utf-8').decode(bytes.slice(1)).replace(/\0/g,'').trim();
    if(bytes[0]===0x01||bytes[0]===0xFF){
      const s=bytes[0]===0x01?bytes.slice(1):bytes;
      const u=new Uint16Array(s.buffer,s.byteOffset,Math.floor(s.length/2));
      return String.fromCharCode(...u).replace(/\0/g,'').trim();
    }
    return latin1(bytes.slice(1)).trim();
  }
  function syncsafe(a,b,c,d){return((a&0x7F)<<21)|((b&0x7F)<<14)|((c&0x7F)<<7)|(d&0x7F)}
  function parseID3v2(buf){
    const b=new Uint8Array(buf);
    if(b[0]!==0x49||b[1]!==0x44||b[2]!==0x33)return null;
    const ver=b[3],flags=b[5];
    const tagSize=syncsafe(b[6],b[7],b[8],b[9])+10;
    let off=10;if(flags&0x40)off+=4+syncsafe(b[10],b[11],b[12],b[13]);
    const meta={};
    while(off+10<tagSize&&off+10<buf.byteLength){
      const id=latin1(b.slice(off,off+4));
      if(!id.trim()||id==='\0\0\0\0')break;
      const fsize=ver>=4?syncsafe(b[off+4],b[off+5],b[off+6],b[off+7]):u32be(buf,off+4);
      if(fsize<=0||off+10+fsize>buf.byteLength)break;
      const fd=new Uint8Array(buf,off+10,fsize);
      if(id==='TIT2')meta.title=decodeStr(fd);
      else if(id==='TPE1')meta.artist=meta.artist||decodeStr(fd);
      else if(id==='TALB')meta.album=decodeStr(fd);
      else if(id==='TYER'||id==='TDRC')meta.year=decodeStr(fd).slice(0,4);
      else if(id==='TCON'){let g=decodeStr(fd);g=g.replace(/^\((\d+)\)/,(_,n)=>GENRES[+n]||g);meta.genre=g;}
      else if(id==='APIC'&&!meta.cover){
        let i=1;while(i<fd.length&&fd[i]!==0)i++;i++;i++;
        while(i<fd.length&&fd[i]!==0)i++;i++;
        meta.cover=new Uint8Array(fd.buffer,fd.byteOffset+i,fd.length-i);
      }
      off+=10+fsize;
    }
    return meta;
  }
  function parseID3v1(buf){
    if(buf.byteLength<128)return null;
    const off=buf.byteLength-128,b=new Uint8Array(buf,off,3);
    if(b[0]!==0x54||b[1]!==0x41||b[2]!==0x47)return null;
    const t=(o,l)=>latin1(new Uint8Array(buf,off+o,l)).trim();
    const meta={title:t(3,30),artist:t(33,30),album:t(63,30),year:t(93,4)};
    const g=u8(buf,off+127);if(g<GENRES.length)meta.genre=GENRES[g];
    return meta;
  }
  function parseFLAC(buf){
    const b=new Uint8Array(buf);
    if(b[0]!==0x66||b[1]!==0x4C||b[2]!==0x61||b[3]!==0x43)return null;
    const meta={};let off=4;
    while(off+4<buf.byteLength){
      const bt=b[off]&0x7F,last=!!(b[off]&0x80),bs=(b[off+1]<<16)|(b[off+2]<<8)|b[off+3];
      off+=4;
      if(bt===4){
        const vl=u32le(buf,off);off+=4+vl;const cnt=u32le(buf,off);off+=4;
        for(let i=0;i<cnt;i++){
          const cl=u32le(buf,off);off+=4;
          const c=new TextDecoder('utf-8').decode(new Uint8Array(buf,off,cl));off+=cl;
          const eq=c.indexOf('=');if(eq>0){const k=c.slice(0,eq).toUpperCase(),v=c.slice(eq+1);
            if(k==='TITLE')meta.title=v;if(k==='ARTIST')meta.artist=v;
            if(k==='ALBUM')meta.album=v;if(k==='DATE'||k==='YEAR')meta.year=v.slice(0,4);
            if(k==='GENRE')meta.genre=v;}
        }
      }else if(bt===6&&!meta.cover){
        let po=off;const ml=u32be(buf,po);po+=4+ml+u32be(buf,po+ml+4)+4+16+4;
        // simpler: just grab from current offset
        po=off;u32be(buf,po);po+=4;const mll=u32be(buf,po);po+=4+mll;
        const dll=u32be(buf,po);po+=4+dll;po+=16;const dlen=u32be(buf,po);po+=4;
        meta.cover=new Uint8Array(buf,po,dlen);
      }
      off+=bs;if(last)break;
    }
    return Object.keys(meta).length?meta:null;
  }
  function parseM4A(buf){
    const meta={};
    function readAtoms(buf,off,end){
      while(off+8<end&&off<buf.byteLength){
        const size=u32be(buf,off);if(size<8)break;
        const name=latin1(new Uint8Array(buf,off+4,4));
        const body=off+8,next=off+size;
        if(['moov','udta','ilst'].includes(name))readAtoms(buf,body,next);
        else if(name==='meta')readAtoms(buf,body+4,next);
        else{
          const MAP={'\xa9nam':'title','\xa9ART':'artist','\xa9alb':'album','\xa9day':'year','\xa9gen':'genre'};
          if(MAP[name]){const v=readData(buf,body,next);if(v&&typeof v==='string')meta[MAP[name]]=v;}
          if(name==='covr'){const v=readData(buf,body,next);if(v instanceof Uint8Array)meta.cover=v;}
        }
        off=next;
      }
    }
    function readData(buf,off,end){
      if(off+8>=end)return null;
      const size=u32be(buf,off),type=latin1(new Uint8Array(buf,off+4,4));
      if(type!=='data'||size<16)return null;
      const dt=u32be(buf,off+8),content=new Uint8Array(buf,off+16,size-16);
      if(dt===1||dt===0)return new TextDecoder('utf-8').decode(content).replace(/\0/g,'').trim();
      if(dt===13||dt===14)return content;
      return null;
    }
    readAtoms(buf,0,buf.byteLength);
    return Object.keys(meta).length?meta:null;
  }
  const GENRES=['Blues','Classic Rock','Country','Dance','Disco','Funk','Grunge','Hip-Hop','Jazz','Metal','New Age','Oldies','Other','Pop','R&B','Rap','Reggae','Rock','Techno','Industrial','Alternative','Ska','Death Metal','Pranks','Soundtrack','Euro-Techno','Ambient','Trip-Hop','Vocal','Jazz+Funk','Fusion','Trance','Classical','Instrumental','Acid','House','Game','Sound Clip','Gospel','Noise','AlternRock','Bass','Soul','Punk','Space','Meditative','Instrumental Pop','Instrumental Rock','Ethnic','Gothic','Darkwave','Techno-Industrial','Electronic','Pop-Folk','Eurodance','Dream','Southern Rock','Comedy','Cult','Gangsta','Top 40','Christian Rap','Pop/Funk','Jungle','Native American','Cabaret','New Wave','Psychadelic','Rave','Showtunes','Trailer','Lo-Fi','Tribal','Acid Punk','Acid Jazz','Polka','Retro','Musical','Rock & Roll','Hard Rock'];

  async function parse(file){
    const sliceSize=Math.min(file.size,512*1024);
    const headBuf=await file.slice(0,sliceSize).arrayBuffer();
    const tailBuf=await file.slice(Math.max(0,file.size-256)).arrayBuffer();
    const name=file.name.toLowerCase();
    let meta=null;
    if(name.endsWith('.flac'))meta=parseFLAC(headBuf);
    else if(name.endsWith('.m4a')||name.endsWith('.mp4')||name.endsWith('.aac'))meta=parseM4A(headBuf);
    else{meta=parseID3v2(headBuf);if(!meta?.title){const v1=parseID3v1(tailBuf);if(v1?.title)meta={...meta,...v1};}}
    if(!meta)meta={};
    if(meta.cover instanceof Uint8Array){
      const blob=new Blob([meta.cover]);
      meta.coverDataUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(blob);});
      delete meta.cover;
    }
    if(!meta.title)meta.title=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/^\d+[\s.-]+/,'').replace(/\b\w/g,c=>c.toUpperCase()).trim();
    if(!meta.artist)meta.artist='Unknown Artist';
    meta.album=meta.album||'';meta.genre=meta.genre||'';meta.year=meta.year||'';
    return meta;
  }
  return{parse};
})();

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
const ST={idx:-1,playing:false,shuffle:false,repeat:false,vol:.85,liked:new Set(),pal:{c60:'#080810',c30:'#14102a',c10:'#c8b8f8'}};

/* LIBRARY — stored in memory only (files are File objects, can't be serialised)
   We save metadata to localStorage so the list persists across sessions,
   but the actual File objects are re-linked when the user re-opens files.
   On reload, tracks show in the list but need files re-selected to play. */
let LIBRARY = []; // [{id, title, artist, album, genre, year, dur, cover, file, objectUrl, needsFile}]

function saveLibMeta(){
  const saveable=LIBRARY.map(t=>({id:t.id,title:t.title,artist:t.artist,album:t.album,genre:t.genre,year:t.year,dur:t.dur,cover:t.cover,needsFile:true}));
  try{localStorage.setItem('cr_lib',JSON.stringify(saveable));}catch(e){}
}
function loadLibMeta(){
  try{
    const saved=JSON.parse(localStorage.getItem('cr_lib')||'[]');
    LIBRARY=saved.map(t=>({...t,file:null,objectUrl:null,needsFile:true}));
  }catch(e){LIBRARY=[];}
}

/* ─────────────────────────────────────────
   AUDIO ENGINE
───────────────────────────────────────── */
const aud=new Audio();
aud.volume=.85;
let actx=null,analyser=null,wvData=null;

function ensureActx(){
  if(actx)return;
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=actx.createAnalyser();analyser.fftSize=256;
    wvData=new Uint8Array(analyser.frequencyBinCount);
    const s=actx.createMediaElementSource(aud);
    s.connect(analyser);analyser.connect(actx.destination);
  }catch(e){}
}

aud.addEventListener('timeupdate',()=>{
  if(!aud.duration)return;
  const p=aud.currentTime/aud.duration;
  document.getElementById('progBar').style.width=(p*100).toFixed(2)+'%';
  document.getElementById('mpFill').style.width=(p*100).toFixed(2)+'%';
  document.getElementById('tNow').textContent=ft(aud.currentTime);
});
aud.addEventListener('loadedmetadata',()=>{document.getElementById('tTot').textContent=ft(aud.duration);hideLoad();});
aud.addEventListener('waiting',showLoad);
aud.addEventListener('playing',hideLoad);
aud.addEventListener('error',()=>{hideLoad();toast('Cannot play — select the file again');});
aud.addEventListener('ended',()=>{ST.repeat?(aud.currentTime=0,aud.play()):nextTrk();});

function showLoad(){document.getElementById('loadOverlay').classList.add('show');}
function hideLoad(){document.getElementById('loadOverlay').classList.remove('show');}

/* ─────────────────────────────────────────
   GENERATED ART (fallback)
───────────────────────────────────────── */
const artCache={};
function rngFor(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}
function makeArt(key){
  if(artCache[key])return artCache[key];
  const r=rngFor(String(key).split('').reduce((a,c)=>a+c.charCodeAt(0),0));
  const{c60,c30,c10}=ST.pal;
  const sh=[];
  for(let i=0;i<6;i++){const cx=Math.round(r()*380+10),cy=Math.round(r()*380+10),rd=Math.round(r()*110+25),op=(r()*.5+.12).toFixed(2);sh.push(`<circle cx="${cx}" cy="${cy}" r="${rd}" fill="${i%3===0?c10:i%3===1?c30:c60}" opacity="${op}"/>`);}
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400"><rect width="400" height="400" fill="${c60}"/>${sh.join('')}</svg>`;
  artCache[key]='data:image/svg+xml,'+encodeURIComponent(svg);
  return artCache[key];
}

/* ─────────────────────────────────────────
   ADD FILES — core function
───────────────────────────────────────── */
const audioExts=/\.(mp3|flac|wav|aac|ogg|m4a|opus|wma|aiff|ape)$/i;

async function addFiles(fileList){
  if(!fileList||!fileList.length)return;
  const files=Array.from(fileList).filter(f=>audioExts.test(f.name)||f.type.startsWith('audio/'));
  if(!files.length){toast('No audio files found');return;}

  hideAddMenu();
  showProcessing(`Reading metadata... 0 / ${files.length}`);

  let added=0;
  for(let i=0;i<files.length;i++){
    const file=files[i];
    document.getElementById('processingTxt').textContent=`Reading ${i+1} / ${files.length}: ${file.name.slice(0,30)}`;

    /* Skip duplicates by filename */
    if(LIBRARY.find(t=>t.title&&t.file?.name===file.name&&t.artist)){
      continue;
    }

    let meta={};
    try{meta=await MetaParser.parse(file);}catch(e){}

    /* Create an object URL so the audio element can play it */
    const objectUrl=URL.createObjectURL(file);

    /* Get duration by loading briefly */
    let dur=0;
    try{
      dur=await new Promise(res=>{
        const a=new Audio();
        a.preload='metadata';
        a.onloadedmetadata=()=>{res(a.duration||0);a.src='';};
        a.onerror=()=>res(0);
        a.src=objectUrl;
        setTimeout(()=>res(0),3000); /* timeout fallback */
      });
    }catch(e){}

    const id=Math.random().toString(36).slice(2);
    LIBRARY.push({
      id,
      title:  meta.title  || file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/^\d+[\s.-]+/,'').replace(/\b\w/g,c=>c.toUpperCase()).trim(),
      artist: meta.artist || 'Unknown Artist',
      album:  meta.album  || '',
      genre:  meta.genre  || '',
      year:   meta.year   || '',
      dur,
      cover:  meta.coverDataUrl || '',
      file,
      objectUrl,
      needsFile: false
    });
    added++;

    /* Update palette from first track with cover */
    if(added===1 && meta.coverDataUrl) extractPalFromDataUrl(meta.coverDataUrl);
  }

  hideProcessing();
  saveLibMeta();
  renderLib(document.getElementById('srchIn').value);

  if(added>0){
    toast(`Added ${added} track${added===1?'':'s'}`);
    /* Auto-play first track if nothing is playing */
    if(ST.idx<0) loadIdx(LIBRARY.findIndex(t=>!t.needsFile),true);
  }else{
    toast('No new tracks added');
  }
}

/* ─────────────────────────────────────────
   LOAD & PLAY
───────────────────────────────────────── */
function loadIdx(idx,play=true){
  if(!LIBRARY.length)return;
  idx=((idx%LIBRARY.length)+LIBRARY.length)%LIBRARY.length;
  ST.idx=idx;
  const t=LIBRARY[idx];

  /* If file not loaded yet (restored from localStorage), prompt user */
  if(t.needsFile||!t.objectUrl){
    document.getElementById('tTitle').textContent=t.title||'Unknown';
    document.getElementById('tArtist').textContent=t.artist||'Unknown Artist';
    document.getElementById('mpT').textContent=t.title||'Unknown';
    document.getElementById('mpA').textContent=t.artist||'Unknown Artist';
    setPlaying(false);
    toast('File not loaded — tap "Add Files" and re-select this track');
    renderLib();
    return;
  }

  const artSrc=t.cover||makeArt(t.id);
  const ci=document.getElementById('coverImg');
  ci.classList.add('swap');
  setTimeout(()=>{ci.src=artSrc;ci.classList.remove('swap');},230);

  document.getElementById('mpArt').src=artSrc;
  document.getElementById('tTitle').textContent=t.title||'Unknown';
  document.getElementById('tArtist').textContent=t.artist||'Unknown Artist';
  document.getElementById('mpT').textContent=t.title||'Unknown';
  document.getElementById('mpA').textContent=t.artist||'Unknown Artist';
  document.getElementById('tTot').textContent=ft(t.dur||0);
  document.getElementById('progBar').style.width='0%';
  document.getElementById('tNow').textContent='0:00';
  document.getElementById('likeBtn').classList.toggle('on',ST.liked.has(idx));

  const ch=[];
  if(t.genre)ch.push(`<span class="chip hi">${esc(t.genre)}</span>`);
  if(t.album)ch.push(`<span class="chip">${esc(t.album)}</span>`);
  if(t.year) ch.push(`<span class="chip">${esc(t.year)}</span>`);
  document.getElementById('chips').innerHTML=ch.join('');

  updateAppBg(t.cover);
  showLoad();
  aud.src=t.objectUrl;
  aud.load();

  if(play){
    ensureActx();
    if(actx&&actx.state==='suspended')actx.resume();
    aud.play().then(()=>setPlaying(true)).catch(()=>{hideLoad();toast('Tap play to start');});
  }else setPlaying(false);

  renderLib(document.getElementById('srchIn').value);
}

function updateAppBg(coverDataUrl){
  /* Extract dominant color from cover art for ambient background */
  if(!coverDataUrl){
    document.getElementById('app').style.background='';
    return;
  }
  const img=new Image();
  img.onload=()=>{
    const oc=document.createElement('canvas');oc.width=8;oc.height=8;
    const ox=oc.getContext('2d');ox.drawImage(img,0,0,8,8);
    try{
      const d=ox.getImageData(0,0,8,8).data;
      let r=0,g=0,b=0,n=0;
      for(let i=0;i<d.length;i+=4){if(d[i+3]>128){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}}
      if(n>0){r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);}
      const dark=`rgba(${Math.round(r*.3)},${Math.round(g*.3)},${Math.round(b*.3)},.8)`;
      const mid=`rgba(${r},${g},${b},.1)`;
      document.getElementById('app').style.background=
        `radial-gradient(ellipse 80% 50% at 20% 10%,${dark} 0%,transparent 60%),`+
        `radial-gradient(ellipse 60% 40% at 80% 80%,${mid} 0%,transparent 55%),var(--bg)`;
    }catch(e){}
  };
  img.src=coverDataUrl;
}

function extractPalFromDataUrl(url){updateAppBg(url);}

/* ─────────────────────────────────────────
   PLAYBACK CONTROLS
───────────────────────────────────────── */
function togglePlay(){
  ensureActx();
  if(actx&&actx.state==='suspended')actx.resume();
  if(ST.idx<0){
    const first=LIBRARY.findIndex(t=>!t.needsFile&&t.objectUrl);
    if(first>=0)loadIdx(first);
    else toast('Add files first — tap Library');
    return;
  }
  const t=LIBRARY[ST.idx];
  if(t.needsFile||!t.objectUrl){toast('Re-add this file to play it');return;}
  aud.paused?aud.play().then(()=>setPlaying(true)).catch(()=>{}):( aud.pause(),setPlaying(false));
}

function setPlaying(v){
  ST.playing=v;
  document.getElementById('app').classList.toggle('playing',v);
  const pi='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  const pp='<polygon points="5,3 19,12 5,21"/>';
  document.getElementById('playIco').innerHTML=v?pi:pp;
  document.getElementById('mpIco').innerHTML=v?pi:pp;
}

function nextTrk(){
  if(!LIBRARY.length)return;
  if(ST.shuffle){
    const avail=LIBRARY.filter(t=>!t.needsFile&&t.objectUrl);
    if(avail.length)loadIdx(LIBRARY.indexOf(avail[Math.floor(Math.random()*avail.length)]));
  }else{
    let next=(ST.idx+1)%LIBRARY.length;
    loadIdx(next);
  }
}
function prevTrk(){
  if(aud.currentTime>4){aud.currentTime=0;return;}
  let prev=(ST.idx-1+LIBRARY.length)%LIBRARY.length;
  loadIdx(prev);
}
function togShuffle(){ST.shuffle=!ST.shuffle;['pillShuffle','ciShuffle'].forEach(id=>document.getElementById(id)?.classList.toggle('on',ST.shuffle));toast(ST.shuffle?'Shuffle on':'Shuffle off');}
function togRepeat(){ST.repeat=!ST.repeat;['pillRepeat','ciRepeat'].forEach(id=>document.getElementById(id)?.classList.toggle('on',ST.repeat));toast(ST.repeat?'Repeat on':'Repeat off');}
function togLike(){if(ST.idx<0)return;ST.liked.has(ST.idx)?ST.liked.delete(ST.idx):ST.liked.add(ST.idx);document.getElementById('likeBtn').classList.toggle('on',ST.liked.has(ST.idx));toast(ST.liked.has(ST.idx)?'Liked':'Removed from liked');}
function setVol(v){ST.vol=+v/100;aud.volume=ST.vol;document.getElementById('vv').textContent=v;document.getElementById('volSl').style.setProperty('--p',v);}
setVol(85);

/* ─────────────────────────────────────────
   SEEKING
───────────────────────────────────────── */
function doSeek(p){if(!aud.duration)return;aud.currentTime=p*aud.duration;document.getElementById('progBar').style.width=(p*100).toFixed(2)+'%';document.getElementById('tNow').textContent=ft(aud.currentTime);}
function seekC(e){const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));}
function seekT(e){e.preventDefault();const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.touches[0].clientX-r.left)/r.width)));}
function wvSeek(e){const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));}

/* ─────────────────────────────────────────
   WAVEFORM
───────────────────────────────────────── */
let wvT=0;
function drawWave(){
  const cvs=document.getElementById('wvCvs');
  const W=cvs.offsetWidth||360;
  if(cvs.width!==W){cvs.width=W;cvs.height=44;}
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,W,44);
  let useA=false;
  if(analyser&&ST.playing){analyser.getByteFrequencyData(wvData);useA=true;}
  const prog=aud.duration?aud.currentTime/aud.duration:0;
  const c10=ST.pal.c10,c30=ST.pal.c30;
  ctx.beginPath();
  for(let x=0;x<W;x++){
    let amp;
    if(useA){const bi=Math.floor((x/W)*wvData.length);amp=(wvData[bi]/255)*16+Math.sin(x*.04+wvT*.04)*3;}
    else amp=(ST.playing?8:2.5)*(.5+.5*Math.sin(x*.042+wvT*.055));
    const y=22+Math.sin(x*.038+wvT*.045)*amp+Math.sin(x*.093-wvT*.037)*amp*.32;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  const g=ctx.createLinearGradient(0,0,W,0);
  g.addColorStop(0,ha(c10,.07));
  g.addColorStop(Math.max(0,Math.min(1,prog-.002)),ha(c10,.88));
  g.addColorStop(Math.max(0,Math.min(1,prog+.002)),ha(c30,.2));
  g.addColorStop(1,ha(c30,.14));
  ctx.strokeStyle=g;ctx.lineWidth=1.8;ctx.stroke();
  ctx.beginPath();
  for(let x=0;x<W;x++){const y=22-Math.sin(x*.038+wvT*.045)*(ST.playing?5:1.5)*.38;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.strokeStyle=ha(c10,.1);ctx.lineWidth=1;ctx.stroke();
  wvT+=ST.playing?.058:.013;
}
setInterval(drawWave,33);

/* ─────────────────────────────────────────
   LIBRARY RENDER
───────────────────────────────────────── */
function renderLib(q=''){
  const ct=document.getElementById('libCt');
  const loaded=LIBRARY.filter(t=>!t.needsFile&&t.objectUrl).length;
  ct.textContent=LIBRARY.length+(loaded<LIBRARY.length?' ('+loaded+' loaded)':'')+' tracks';

  const list=document.getElementById('trkList');
  const q2=q.toLowerCase();
  const rows=LIBRARY.map((t,i)=>({t,i})).filter(({t})=>!q2||(t.title+t.artist+(t.album||'')+(t.genre||'')).toLowerCase().includes(q2));

  if(!LIBRARY.length){
    list.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <p>Your library is empty.<br>Add music from your computer or NAS.</p>
      <button class="empty-add" onclick="showAddMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Files
      </button>
    </div>`;
    return;
  }
  if(!rows.length){list.innerHTML=`<div class="empty"><p>No results for "${esc(q)}"</p></div>`;return;}

  list.innerHTML=rows.map(({t,i},ri)=>{
    const artSrc=t.cover||makeArt(t.id);
    const isActive=i===ST.idx;
    const needsFile=t.needsFile||!t.objectUrl;
    return `<div class="trk-row${isActive?' on':''}" onclick="loadIdx(${i})" style="animation-delay:${ri*18}ms${needsFile?';opacity:.45':''}">
      <div class="trk-n">${isActive&&ST.playing?'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="5" height="18"/><rect x="16" y="3" width="5" height="18"/></svg>':String(i+1).padStart(2,'0')}</div>
      <img class="trk-art" src="${artSrc}" alt="" onerror="this.src='${makeArt(t.id)}'">
      <div class="trk-info">
        <div class="trk-name">${esc(t.title||'Unknown')}${needsFile?' <span style="font-size:9px;opacity:.5;font-weight:400">(re-add file)</span>':''}</div>
        <div class="trk-meta">${esc(t.artist||'Unknown')}${t.album?' · '+esc(t.album):''}</div>
      </div>
      <div class="trk-dur">${ft(t.dur||0)}</div>
      <button class="trk-del" onclick="event.stopPropagation();removeTrk(${i})" title="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>`;
  }).join('');
}

function removeTrk(i){
  const t=LIBRARY[i];
  if(t.objectUrl)URL.revokeObjectURL(t.objectUrl);
  LIBRARY.splice(i,1);
  if(ST.idx===i){aud.pause();setPlaying(false);ST.idx=-1;}
  else if(ST.idx>i)ST.idx--;
  saveLibMeta();
  renderLib(document.getElementById('srchIn').value);
}

/* ─────────────────────────────────────────
   ADD MENU
───────────────────────────────────────── */
function showAddMenu(){
  const m=document.getElementById('addMenu');
  m.style.display=m.style.display==='none'?'block':'none';
}
function hideAddMenu(){document.getElementById('addMenu').style.display='none';}
function pickFiles(){hideAddMenu();document.getElementById('filePickerAudio').click();}
function pickFolder(){hideAddMenu();document.getElementById('filePickerFolder').click();}

/* Click outside add menu to close */
document.addEventListener('click',e=>{
  const menu=document.getElementById('addMenu');
  const btn=document.querySelector('.lib-add');
  if(menu&&btn&&!menu.contains(e.target)&&!btn.contains(e.target)){
    menu.style.display='none';
  }
});

/* ─────────────────────────────────────────
   DRAG & DROP onto the whole app
───────────────────────────────────────── */
document.addEventListener('dragover',e=>{e.preventDefault();});
document.addEventListener('drop',e=>{
  e.preventDefault();
  const files=e.dataTransfer.files;
  if(files.length)addFiles(files);
});

/* ─────────────────────────────────────────
   TABS + MINI
───────────────────────────────────────── */
function goTab(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('pg'+name).classList.add('on');
  if(btn)btn.classList.add('on');
  document.getElementById('mini').classList.toggle('hidden',name==='Now'||ST.idx<0);
  if(name==='Lib')renderLib(document.getElementById('srchIn').value);
}

/* ─────────────────────────────────────────
   TOAST + PROCESSING
───────────────────────────────────────── */
let toastT=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2400);}
function showProcessing(msg){const el=document.getElementById('processing');document.getElementById('processingTxt').textContent=msg;el.classList.add('show');}
function hideProcessing(){document.getElementById('processing').classList.remove('show');}

/* ─────────────────────────────────────────
   KEYBOARD SHORTCUTS
───────────────────────────────────────── */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')aud.currentTime=Math.min(aud.duration||0,aud.currentTime+10);
  if(e.code==='ArrowLeft') aud.currentTime=Math.max(0,aud.currentTime-10);
  if(e.code==='KeyN')nextTrk();
  if(e.code==='KeyP')prevTrk();
});

/* ─────────────────────────────────────────
   UTILS
───────────────────────────────────────── */
function ft(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ha(hex,a){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}catch{return`rgba(128,128,128,${a})`;}}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
loadLibMeta();
renderLib();
</script>
