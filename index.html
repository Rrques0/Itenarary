<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CHROMATIC</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
:root{
  --bg:#04040a;
  --s1:#0a0a14;
  --s2:#10101e;
  --s3:#181828;
  --line:rgba(255,255,255,.06);
  --line2:rgba(255,255,255,.12);
  --txt:#f0eeff;
  --sub:rgba(240,238,255,.4);
  --dim:rgba(240,238,255,.18);
  --ac:#7c6fff;
  --ac2:#ff6fb0;
  --ac3:#6fffff;
  --acg:rgba(124,111,255,.14);
  --g:var(--sans);
  --sans:'Space Grotesk',system-ui,sans-serif;
  --mono:'Space Mono',monospace;
  --ease:cubic-bezier(.16,1,.3,1);
  --ease2:cubic-bezier(.34,1.56,.64,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--sans)}

/* ── SHELL ── */
#app{
  position:relative;width:100%;height:100dvh;
  max-width:420px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);
}
@media(min-width:420px){#app{box-shadow:0 0 0 1px var(--line)}}

/* ── ANIMATED BACKGROUND ── */
#bgLayer{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#bgBlur{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(80px) saturate(2) brightness(.18);
  opacity:0;transition:opacity 1s var(--ease),background-image .8s;
}
#bgBlur.on{opacity:1}
#bgGrad{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 120% 60% at 50% 100%,rgba(4,4,10,.98) 0%,transparent 65%),
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(4,4,10,.9) 0%,transparent 60%);
}
#bgGrid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(124,111,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,111,255,.04) 1px, transparent 1px);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}

/* ── SCAN LINE ── */
#scan{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px
  );
}

/* ── CONTENT ── */
#content{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;padding:16px 18px 12px;gap:10px;flex-shrink:0;
  border-bottom:1px solid var(--line);
}
.app-name{
  font-size:11px;font-weight:700;letter-spacing:5px;color:var(--dim);
  text-transform:uppercase;
}
.tb-spacer{flex:1}
.ico-btn{
  width:34px;height:34px;border-radius:8px;
  border:1px solid var(--line);background:rgba(255,255,255,.03);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--sub);transition:all .18s var(--ease);
  -webkit-appearance:none;flex-shrink:0;
}
.ico-btn:hover,.ico-btn:active{border-color:var(--line2);color:var(--txt);background:rgba(255,255,255,.06)}
.ico-btn.on{border-color:var(--ac);color:var(--ac);background:var(--acg)}
.ico-btn svg{width:15px;height:15px;display:block}

/* ── TABS ── */
#tabs{
  display:flex;flex-shrink:0;
  border-bottom:1px solid var(--line);
  background:rgba(4,4,10,.6);
}
.tab{
  flex:1;padding:10px 8px;text-align:center;
  font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:var(--dim);cursor:pointer;border:none;background:none;
  font-family:var(--sans);transition:all .2s var(--ease);
  position:relative;-webkit-appearance:none;
}
.tab::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:1px;
  opacity:0;transition:opacity .2s;
}
.tab.on{color:var(--txt)}
.tab.on::after{opacity:1}

/* ── PAGES ── */
#pages{flex:1;overflow:hidden;display:flex;flex-direction:column}
.page{display:none;flex-direction:column;width:100%;height:100%;overflow:hidden}
.page.on{display:flex}

/* ══════════════════════════════════════
   NOW PLAYING
══════════════════════════════════════ */
#pgNow{overflow-y:auto;scrollbar-width:none;padding:0 18px 24px}
#pgNow::-webkit-scrollbar{display:none}

/* ART */
#artSection{padding-top:18px;flex-shrink:0;position:relative}
#artFrame{
  width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;
  position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.07);
  transition:box-shadow .6s var(--ease);
}
.playing #artFrame{
  box-shadow:
    0 32px 80px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.1),
    0 0 80px rgba(124,111,255,.25),
    0 0 120px rgba(255,111,176,.1);
}
#artImg{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .5s,transform .5s}
#artImg.swap{opacity:0;transform:scale(.96)}
#artSheen{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%);pointer-events:none}

/* CHARACTER STAGE — overlays bottom of art */
#charStage{
  position:absolute;bottom:0;left:0;right:0;height:100px;
  pointer-events:none;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
  gap:8px;padding-bottom:4px;
  background:linear-gradient(to top,rgba(4,4,10,.6) 0%,transparent 100%);
}
.char-slot{
  display:flex;flex-direction:column;align-items:center;
  opacity:0;transform:translateY(20px);
  transition:opacity .4s var(--ease),transform .4s var(--ease);
}
.char-slot.visible{opacity:1;transform:translateY(0)}

/* Character SVG animations */
@keyframes ch-bounce{0%,100%{transform:translateY(0) scaleX(1)}25%{transform:translateY(-22px) scaleX(.95)}50%{transform:translateY(-12px) scaleX(1.05)}75%{transform:translateY(-26px) scaleX(.98)}}
@keyframes ch-spin{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}
@keyframes ch-freeze{0%,100%{transform:rotate(-18deg) translateX(-4px)}50%{transform:rotate(14deg) translateX(4px)}}
@keyframes ch-wave{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-14px) rotate(-6deg)}66%{transform:translateY(-8px) rotate(5deg)}}
@keyframes ch-slide{0%,100%{transform:translateX(0) scaleX(1)}40%{transform:translateX(-12px) scaleX(-1)}70%{transform:translateX(8px) scaleX(1)}}
@keyframes ch-idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Arm animations */
@keyframes arm-l{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(40deg)}}
@keyframes arm-r{0%,100%{transform:rotate(15deg)}50%{transform:rotate(-40deg)}}
@keyframes leg-l{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(25deg)}}
@keyframes leg-r{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-25deg)}}
@keyframes head-bob{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes tail-swing{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}

.a-arm-l{transform-origin:top center;animation:arm-l .5s ease-in-out infinite}
.a-arm-r{transform-origin:top center;animation:arm-r .5s ease-in-out infinite}
.a-leg-l{transform-origin:top center;animation:leg-l .5s ease-in-out infinite}
.a-leg-r{transform-origin:top center;animation:leg-r .5s ease-in-out infinite}
.a-head{transform-origin:bottom center;animation:head-bob .6s ease-in-out infinite}
.a-tail{transform-origin:top left;animation:tail-swing .7s ease-in-out infinite}

/* Move classes applied to .char-slot */
.m-bounce{animation:ch-bounce .6s cubic-bezier(.36,.07,.19,.97) infinite}
.m-spin{animation:ch-spin .7s linear infinite}
.m-freeze{animation:ch-freeze 1s ease-in-out infinite}
.m-wave{animation:ch-wave .8s ease-in-out infinite}
.m-slide{animation:ch-slide .9s ease-in-out infinite}
.m-idle{animation:ch-idle 1.2s ease-in-out infinite}

/* TRACK INFO */
#trackInfo{padding-top:18px;flex-shrink:0}
.now-meta{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--dim);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.now-meta-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 2s ease-in-out infinite}
.playing .now-meta-dot{background:var(--ac2)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#tTitle{font-size:clamp(22px,6vw,30px);font-weight:700;letter-spacing:-.5px;line-height:1.1;color:var(--txt)}
#tArtist{font-size:13px;color:var(--sub);margin-top:5px;font-weight:400}
.t-chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tchip{
  padding:3px 10px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1.5px;
  border:1px solid rgba(124,111,255,.3);color:var(--ac);background:rgba(124,111,255,.08);
}

/* WAVEFORM */
#wvSection{padding-top:14px;flex-shrink:0;cursor:pointer}
#wvCvs{display:block;width:100%;height:48px}

/* PROGRESS */
#progSection{padding-top:8px;flex-shrink:0}
#progRail{width:100%;height:20px;display:flex;align-items:center;cursor:pointer;touch-action:none}
#progTrack{width:100%;height:2px;background:rgba(255,255,255,.08);border-radius:1px;position:relative}
#progFill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--ac),var(--ac2));max-width:100%;transition:width .08s linear}
#progHead{position:absolute;right:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--txt);box-shadow:0 0 10px var(--ac);opacity:0;transition:opacity .15s;pointer-events:none}
#progRail:hover #progHead{opacity:1}
.prog-times{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;margin-top:5px}

/* CONTROLS */
#ctrlSection{padding-top:16px;flex-shrink:0}
#ctrlRow{display:flex;align-items:center;justify-content:space-between}
.ctrl{
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--sub);width:42px;height:42px;border-radius:10px;
  transition:all .18s var(--ease);-webkit-appearance:none;
}
.ctrl:hover,.ctrl:active{color:var(--txt);background:rgba(255,255,255,.05)}
.ctrl:active{transform:scale(.88)}
.ctrl.on{color:var(--ac)}
.ctrl svg{display:block}
#playBtn{
  width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:flex;align-items:center;justify-content:center;
  color:#fff;-webkit-appearance:none;
  box-shadow:0 8px 30px rgba(124,111,255,.4),0 0 0 0 rgba(124,111,255,.2);
  transition:transform .15s var(--ease2),box-shadow .3s;
}
#playBtn:hover{transform:scale(1.07);box-shadow:0 10px 40px rgba(124,111,255,.55),0 0 0 10px rgba(124,111,255,.08)}
#playBtn:active{transform:scale(.92)}
.playing #playBtn{animation:play-pulse 2.5s ease-in-out infinite}
@keyframes play-pulse{0%,100%{box-shadow:0 8px 30px rgba(124,111,255,.4),0 0 0 0 rgba(124,111,255,.1)}50%{box-shadow:0 10px 40px rgba(124,111,255,.6),0 0 0 12px rgba(124,111,255,.06)}}
#playBtn svg{width:24px;height:24px;display:block;margin-left:2px}
#playBtn.paused svg{margin-left:3px}

/* VOL */
#volRow{display:flex;align-items:center;gap:10px;padding-top:14px;flex-shrink:0}
.vi{color:var(--dim);display:flex;align-items:center;flex-shrink:0}
.vi svg{width:14px;height:14px;display:block}
input[type=range]{
  flex:1;-webkit-appearance:none;height:2px;border-radius:1px;
  background:linear-gradient(to right,var(--ac) calc(var(--pv,80)*1%),rgba(255,255,255,.08) calc(var(--pv,80)*1%));
  cursor:pointer;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--txt);cursor:pointer;box-shadow:0 0 8px rgba(124,111,255,.5);
  transition:transform .15s;
}
input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.25)}
.vval{font-family:var(--mono);font-size:9px;color:var(--dim);min-width:20px;text-align:right;letter-spacing:1px}

/* LOAD OVERLAY */
#loadOv{position:absolute;inset:0;border-radius:16px;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(4,4,10,.75);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s}
#loadOv.on{opacity:1}
.spin{width:28px;height:28px;border:2px solid rgba(255,255,255,.06);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════
   LIBRARY
══════════════════════════════════════ */
#pgLib{flex-direction:column}
#libHead{flex-shrink:0;padding:14px 18px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
.lib-title{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase;flex:1}
#libStats{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;flex-shrink:0}
#srchWrap{flex-shrink:0;padding:10px 18px;position:relative}
#srch{
  width:100%;background:var(--s2);border:1px solid var(--line);border-radius:8px;
  padding:9px 14px 9px 36px;color:var(--txt);font-family:var(--sans);font-size:12px;
  outline:none;transition:border-color .2s;-webkit-appearance:none;letter-spacing:.3px;
}
#srch:focus{border-color:rgba(124,111,255,.3)}
#srch::placeholder{color:var(--dim)}
.srch-ic{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
.srch-ic svg{width:14px;height:14px;display:block}
/* Add button row */
#addRow{flex-shrink:0;display:flex;gap:6px;padding:0 18px 10px}
.add-btn-main{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px;border-radius:8px;
  background:rgba(124,111,255,.1);border:1px solid rgba(124,111,255,.25);
  color:var(--ac);font-family:var(--sans);font-size:11px;font-weight:600;
  letter-spacing:1px;cursor:pointer;-webkit-appearance:none;transition:all .18s;
}
.add-btn-main:hover,.add-btn-main:active{background:rgba(124,111,255,.2);border-color:rgba(124,111,255,.5)}
.add-btn-main svg{width:13px;height:13px;display:block;flex-shrink:0}
#trkScroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:0 18px 16px}
#trkScroll::-webkit-scrollbar{display:none}
#trkList{display:flex;flex-direction:column;gap:1px}

.trk{
  display:flex;align-items:center;gap:12px;
  padding:9px 10px;border-radius:8px;cursor:pointer;
  transition:background .15s;min-height:60px;
  position:relative;
}
.trk:hover{background:var(--s2)}
.trk.on{background:rgba(124,111,255,.08)}
.trk.on .trk-name{color:var(--ac)}
.trk.on::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--ac),var(--ac2));border-radius:1px}
.trk-n{font-family:var(--mono);font-size:10px;color:var(--dim);width:22px;text-align:center;flex-shrink:0}
.trk-art{width:44px;height:44px;border-radius:6px;object-fit:cover;display:block;background:var(--s3);flex-shrink:0}
.trk-info{flex:1;min-width:0}
.trk-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);transition:color .2s;letter-spacing:-.1px}
.trk-sub{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.trk-dur{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;flex-shrink:0}
.trk-del{background:none;border:none;cursor:pointer;color:var(--dim);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;opacity:0;-webkit-appearance:none}
.trk:hover .trk-del{opacity:1}
.trk-del:hover{color:#ff6b6b;background:rgba(255,107,107,.1)}
.trk-del svg{width:13px;height:13px;display:block}

/* Playing bars */
.pbars{display:flex;align-items:flex-end;gap:2px;height:14px}
.pbar{width:2px;border-radius:1px;background:var(--ac)}
.pbar:nth-child(1){animation:bar1 .6s ease-in-out infinite;height:8px}
.pbar:nth-child(2){animation:bar2 .6s ease-in-out infinite .1s;height:12px}
.pbar:nth-child(3){animation:bar3 .6s ease-in-out infinite .2s;height:6px}
@keyframes bar1{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
@keyframes bar2{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(.2)}}
@keyframes bar3{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}

.lib-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:48px 0;text-align:center}
.lib-empty svg{width:40px;height:40px;color:var(--s3);opacity:.8}
.lib-empty p{font-size:12px;color:var(--sub);line-height:1.7;letter-spacing:.3px}

/* ══════════════════════════════════════
   PLAYLISTS
══════════════════════════════════════ */
#pgPlaylists{flex-direction:column}
#plHead{flex-shrink:0;padding:14px 18px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
.pl-title{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase;flex:1}
#plScroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:12px 18px 16px}
#plScroll::-webkit-scrollbar{display:none}
#plList{display:flex;flex-direction:column;gap:6px}

/* Create new */
#newPlCard{
  display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;
  border:1px dashed rgba(124,111,255,.25);background:rgba(124,111,255,.04);
  cursor:pointer;transition:all .18s;
}
#newPlCard:hover{border-color:rgba(124,111,255,.5);background:rgba(124,111,255,.1)}
.new-pl-ico{width:44px;height:44px;border-radius:8px;background:rgba(124,111,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ac)}
.new-pl-ico svg{width:20px;height:20px;display:block}
.new-pl-label{font-size:13px;font-weight:600;color:var(--ac);letter-spacing:.3px}
.new-pl-sub{font-size:11px;color:var(--dim);margin-top:2px}

.pl-card{
  display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;
  background:var(--s1);border:1px solid var(--line);cursor:pointer;transition:all .18s;
  position:relative;
}
.pl-card:hover{background:var(--s2);border-color:var(--line2)}
.pl-card.active-pl{border-color:rgba(124,111,255,.35);background:rgba(124,111,255,.06)}
.pl-art{
  width:44px;height:44px;border-radius:8px;overflow:hidden;display:grid;
  grid-template-columns:1fr 1fr;gap:1px;background:var(--s3);flex-shrink:0;
}
.pl-art img{width:100%;height:100%;object-fit:cover;display:block}
.pl-art .pl-art-empty{width:100%;height:100%;background:var(--s3);display:flex;align-items:center;justify-content:center}
.pl-info{flex:1;min-width:0}
.pl-name{font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.pl-ct{font-size:11px;color:var(--dim);margin-top:2px;letter-spacing:.3px}
.pl-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.pl-card:hover .pl-actions{opacity:1}
.pl-btn{background:none;border:none;cursor:pointer;color:var(--dim);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-appearance:none}
.pl-btn:hover{color:var(--txt);background:rgba(255,255,255,.06)}
.pl-btn svg{width:13px;height:13px;display:block}

/* PLAYLIST DETAIL VIEW */
#plDetail{
  position:absolute;inset:0;background:var(--bg);z-index:10;
  display:none;flex-direction:column;
  transform:translateX(100%);transition:transform .3s var(--ease);
}
#plDetail.on{display:flex}
#plDetail.slide-in{transform:translateX(0)}
#plDetailHead{flex-shrink:0;padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
.back-btn{background:none;border:none;cursor:pointer;color:var(--sub);display:flex;align-items:center;gap:6px;font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:1px;-webkit-appearance:none;transition:color .15s}
.back-btn:hover{color:var(--txt)}
.back-btn svg{width:16px;height:16px;display:block}
.pl-detail-name{flex:1;font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#plDetailScroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:12px 18px 16px}
#plDetailScroll::-webkit-scrollbar{display:none}
.pl-detail-actions{display:flex;gap:8px;flex-shrink:0;margin-bottom:12px}
.pla-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;border-radius:8px;font-family:var(--sans);font-size:11px;font-weight:600;
  letter-spacing:1px;cursor:pointer;-webkit-appearance:none;transition:all .18s;
}
.pla-play{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border:none;box-shadow:0 4px 20px rgba(124,111,255,.3)}
.pla-play:hover{box-shadow:0 6px 28px rgba(124,111,255,.5)}
.pla-shuf{background:var(--s2);border:1px solid var(--line2);color:var(--sub)}
.pla-shuf:hover{color:var(--txt)}
.pla-btn svg{width:14px;height:14px;display:block}
#plDetailList{display:flex;flex-direction:column;gap:1px}

/* ADD TO PLAYLIST PICKER (floating) */
#plPicker{
  position:absolute;inset:0;z-index:30;background:rgba(4,4,10,.88);
  backdrop-filter:blur(10px);display:none;flex-direction:column;
  align-items:center;justify-content:flex-end;padding-bottom:0;
}
#plPicker.on{display:flex}
#plPickerCard{
  width:100%;background:var(--s1);border-radius:20px 20px 0 0;
  border-top:1px solid var(--line2);padding:16px 18px 30px;
  display:flex;flex-direction:column;gap:8px;
  animation:slideup .3s var(--ease) both;
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.picker-title{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.picker-trk{font-size:13px;color:var(--sub);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-pl{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;transition:background .15s}
.picker-pl:hover{background:var(--s2)}
.picker-pl-ico{width:36px;height:36px;border-radius:6px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.picker-pl-ico img{width:100%;height:100%;object-fit:cover}
.picker-pl-ico svg{width:16px;height:16px;color:var(--dim)}
.picker-pl-name{font-size:13px;font-weight:500;color:var(--txt)}
.picker-close{padding:10px;text-align:center;font-size:12px;color:var(--dim);cursor:pointer;letter-spacing:1px;margin-top:4px}

/* NEW PLAYLIST MODAL */
#plModal{
  position:absolute;inset:0;z-index:35;background:rgba(4,4,10,.9);
  backdrop-filter:blur(12px);display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
}
#plModal.on{display:flex}
.pl-modal-card{
  width:100%;background:var(--s1);border:1px solid var(--line2);border-radius:16px;
  padding:20px;display:flex;flex-direction:column;gap:14px;
  animation:popin .25s var(--ease2) both;
}
@keyframes popin{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.pl-modal-title{font-size:14px;font-weight:700;letter-spacing:-.2px;color:var(--txt)}
.pl-modal-input{
  background:var(--s2);border:1px solid var(--line2);border-radius:8px;
  padding:10px 14px;color:var(--txt);font-family:var(--sans);font-size:14px;
  outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%;
}
.pl-modal-input:focus{border-color:rgba(124,111,255,.5)}
.pl-modal-input::placeholder{color:var(--dim)}
.pl-modal-btns{display:flex;gap:8px}
.pm-cancel{flex:1;padding:10px;border-radius:8px;background:var(--s2);border:1px solid var(--line2);color:var(--sub);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none;letter-spacing:.5px}
.pm-create{flex:1;padding:10px;border-radius:8px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none;letter-spacing:.5px}

/* ── MINI PLAYER ── */
#mini{
  flex-shrink:0;margin:0 10px 8px;border-radius:12px;
  background:rgba(10,10,20,.95);border:1px solid var(--line2);
  backdrop-filter:blur(20px);
  display:none;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;
  position:relative;overflow:hidden;
}
#mini.on{display:flex}
#mini::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(124,111,255,.08),transparent);pointer-events:none}
.mp-art{width:38px;height:38px;border-radius:6px;flex-shrink:0;object-fit:cover;background:var(--s3)}
.mp-info{flex:1;min-width:0}
.mp-t{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt);letter-spacing:-.1px}
.mp-a{font-size:10px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mp-ctrls{display:flex;align-items:center;gap:2px;flex-shrink:0}
.mp-btn{background:none;border:none;cursor:pointer;color:var(--sub);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-appearance:none}
.mp-btn:hover,.mp-btn:active{color:var(--txt);background:rgba(255,255,255,.06)}
.mp-btn svg{width:17px;height:17px;display:block}
.mp-prog{position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.05)}
.mp-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .1s linear}

/* ── NAV ── */
#nav{
  flex-shrink:0;display:flex;
  border-top:1px solid var(--line);background:rgba(4,4,10,.8);
  backdrop-filter:blur(20px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 4px;cursor:pointer;border:none;background:none;
  font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:1.5px;
  color:var(--dim);text-transform:uppercase;-webkit-appearance:none;transition:color .2s;
  position:relative;
}
.nav-btn::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:0 0 2px 2px;opacity:0;transition:opacity .2s}
.nav-btn.on{color:var(--txt)}
.nav-btn.on::after{opacity:1}
.nav-btn svg{width:19px;height:19px;display:block}

/* ── TOAST ── */
#toast{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%) translateY(4px);
  z-index:99;padding:8px 16px;border-radius:6px;
  background:var(--s2);border:1px solid var(--line2);color:var(--sub);
  font-size:11px;font-weight:500;letter-spacing:.5px;
  opacity:0;transition:all .22s var(--ease);pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CONTEXT MENU ── */
#ctx{
  position:absolute;z-index:50;background:var(--s2);border:1px solid var(--line2);
  border-radius:10px;padding:4px;display:none;flex-direction:column;gap:1px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);min-width:180px;
  animation:ctxin .15s var(--ease) both;
}
@keyframes ctxin{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
#ctx.on{display:flex}
.ctx-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;cursor:pointer;transition:background .12s;font-size:12px;font-weight:500;color:var(--sub);letter-spacing:.3px}
.ctx-item:hover{background:var(--s3);color:var(--txt)}
.ctx-item svg{width:14px;height:14px;display:block;flex-shrink:0}
.ctx-sep{height:1px;background:var(--line);margin:3px 0}

<script>
/* ═══════════════════════════════════════════════════
   ID3 PARSER (compact)
═══════════════════════════════════════════════════ */
const Meta=(()=>{
  const D=new TextDecoder('utf-8');
  const lat=b=>Array.from(b).map(c=>String.fromCharCode(c)).join('').replace(/\0/g,'');
  const u32b=(b,o)=>new DataView(b).getUint32(o,false);
  const u32l=(b,o)=>new DataView(b).getUint32(o,true);
  const ss=(a,b,c,d)=>((a&127)<<21)|((b&127)<<14)|((c&127)<<7)|(d&127);
  function dstr(fd){if(!fd.length)return'';if(fd[0]===3)return D.decode(fd.slice(1)).replace(/\0/g,'').trim();if(fd[0]===1){const u=new Uint16Array(fd.slice(1).buffer);return String.fromCharCode(...u).replace(/\0/g,'').trim();}return lat(fd.slice(1)).trim();}
  const GENRES=['Blues','Classic Rock','Country','Dance','Disco','Funk','Grunge','Hip-Hop','Jazz','Metal','New Age','Oldies','Other','Pop','R&B','Rap','Reggae','Rock','Techno','Industrial','Alternative','Ska','Death Metal','Pranks','Soundtrack','Euro-Techno','Ambient','Trip-Hop','Vocal','Jazz+Funk','Fusion','Trance','Classical','Instrumental','Acid','House','Game','Sound Clip','Gospel','Noise','AlternRock','Bass','Soul','Punk','Space'];
  function id3v2(buf){const b=new Uint8Array(buf);if(b[0]!==73||b[1]!==68||b[2]!==51)return null;const ver=b[3],fl=b[5],ts=ss(b[6],b[7],b[8],b[9])+10;let off=10;if(fl&64)off+=4+ss(b[10],b[11],b[12],b[13]);const m={};while(off+10<ts&&off+10<buf.byteLength){const id=lat(b.slice(off,off+4));if(!id.trim()||id==='\0\0\0\0')break;const fs=ver>=4?ss(b[off+4],b[off+5],b[off+6],b[off+7]):u32b(buf,off+4);if(fs<=0||off+10+fs>buf.byteLength)break;const fd=new Uint8Array(buf,off+10,fs);if(id==='TIT2')m.title=dstr(fd);else if(id==='TPE1')m.artist=m.artist||dstr(fd);else if(id==='TALB')m.album=dstr(fd);else if(id==='TYER'||id==='TDRC')m.year=dstr(fd).slice(0,4);else if(id==='TCON'){let g=dstr(fd);g=g.replace(/^\((\d+)\)/,(_,n)=>GENRES[+n]||g);m.genre=g;}else if(id==='APIC'&&!m.cover){let i=1;while(i<fd.length&&fd[i])i++;i++;i++;while(i<fd.length&&fd[i])i++;i++;m.cover=new Uint8Array(fd.buffer,fd.byteOffset+i,fd.length-i);}off+=10+fs;}return m;}
  function id3v1(buf){if(buf.byteLength<128)return null;const o=buf.byteLength-128,b=new Uint8Array(buf,o,3);if(b[0]!==84||b[1]!==65||b[2]!==71)return null;const t=(off,l)=>lat(new Uint8Array(buf,o+off,l)).trim();const m={title:t(3,30),artist:t(33,30),album:t(63,30),year:t(93,4)};const g=new Uint8Array(buf)[o+127];if(g<GENRES.length)m.genre=GENRES[g];return m;}
  function flac(buf){const b=new Uint8Array(buf);if(b[0]!==102||b[1]!==76||b[2]!==97||b[3]!==67)return null;const m={};let off=4;while(off+4<buf.byteLength){const bt=b[off]&127,last=!!(b[off]&128),bs=(b[off+1]<<16)|(b[off+2]<<8)|b[off+3];off+=4;if(bt===4){const vl=u32l(buf,off);off+=4+vl;const cnt=u32l(buf,off);off+=4;for(let i=0;i<cnt;i++){const cl=u32l(buf,off);off+=4;const c=D.decode(new Uint8Array(buf,off,cl));off+=cl;const eq=c.indexOf('=');if(eq>0){const k=c.slice(0,eq).toUpperCase(),v=c.slice(eq+1);if(k==='TITLE')m.title=v;if(k==='ARTIST')m.artist=v;if(k==='ALBUM')m.album=v;if(k==='DATE'||k==='YEAR')m.year=v.slice(0,4);if(k==='GENRE')m.genre=v;}}}else if(bt===6&&!m.cover){let po=off;const ml=u32b(buf,po+4);po+=8+ml;const dl=u32b(buf,po);po+=4+dl;po+=16;const dn=u32b(buf,po);po+=4;m.cover=new Uint8Array(buf,po,dn);}off+=bs;if(last)break;}return Object.keys(m).length?m:null;}
  function m4a(buf){const m={};function ra(buf,off,end){while(off+8<end&&off<buf.byteLength){const sz=u32b(buf,off);if(sz<8)break;const nm=lat(new Uint8Array(buf,off+4,4));const body=off+8,next=off+sz;if(['moov','udta','ilst'].includes(nm))ra(buf,body,next);else if(nm==='meta')ra(buf,body+4,next);else{const MP={'\xa9nam':'title','\xa9ART':'artist','\xa9alb':'album','\xa9day':'year','\xa9gen':'genre'};if(MP[nm]){const v=rd(buf,body,next);if(v&&typeof v==='string')m[MP[nm]]=v;}if(nm==='covr'){const v=rd(buf,body,next);if(v instanceof Uint8Array)m.cover=v;}}off=next;}}function rd(buf,off,end){if(off+8>=end)return null;const sz=u32b(buf,off),tp=lat(new Uint8Array(buf,off+4,4));if(tp!=='data'||sz<16)return null;const dt=u32b(buf,off+8),ct=new Uint8Array(buf,off+16,sz-16);if(dt===1||dt===0)return D.decode(ct).replace(/\0/g,'').trim();if(dt===13||dt===14)return ct;return null;}ra(buf,0,buf.byteLength);return Object.keys(m).length?m:null;}
  async function parse(file){
    const sl=Math.min(file.size,512*1024),hb=await file.slice(0,sl).arrayBuffer(),tb=await file.slice(Math.max(0,file.size-256)).arrayBuffer(),n=file.name.toLowerCase();
    let meta=null;
    if(n.endsWith('.flac'))meta=flac(hb);
    else if(n.endsWith('.m4a')||n.endsWith('.aac')||n.endsWith('.mp4'))meta=m4a(hb);
    else{meta=id3v2(hb);if(!meta?.title){const v=id3v1(tb);if(v?.title)meta={...meta,...v};}}
    if(!meta)meta={};
    if(meta.cover instanceof Uint8Array){const bl=new Blob([meta.cover]);meta.coverUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(bl);});delete meta.cover;}
    if(!meta.title)meta.title=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/^\d+[\s.-]+/,'').replace(/\b\w/g,c=>c.toUpperCase()).trim();
    if(!meta.artist)meta.artist='Unknown Artist';
    meta.album=meta.album||'';meta.genre=meta.genre||'';meta.year=meta.year||'';
    return meta;
  }
  return{parse};
})();

═══════════════════════════════════════════════════ */

let LIBRARY=[];
let PLAYLISTS={}; // {id:{name,trackIds:[]}}

function loadLib(){try{LIBRARY=JSON.parse(localStorage.getItem('cr_lib2')||'[]').map(t=>({...t,file:null,objectUrl:null,needsFile:true}));}catch(e){LIBRARY=[];}}
function savePls(){try{localStorage.setItem('cr_pls',JSON.stringify(PLAYLISTS));}catch(e){}}

/* ═══════════════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════════════ */
const aud=new Audio();
aud.volume=.8;
let actx=null,analyser=null,wvData=null;
function ensureActx(){if(actx)return;try{actx=new(window.AudioContext||window.webkitAudioContext)();analyser=actx.createAnalyser();analyser.fftSize=512;wvData=new Uint8Array(analyser.frequencyBinCount);const s=actx.createMediaElementSource(aud);s.connect(analyser);analyser.connect(actx.destination);}catch(e){}}
aud.addEventListener('timeupdate',()=>{if(!aud.duration)return;const p=aud.currentTime/aud.duration;document.getElementById('progFill').style.width=(p*100).toFixed(2)+'%';document.getElementById('mpFill').style.width=(p*100).toFixed(2)+'%';document.getElementById('tNow').textContent=ft(aud.currentTime);});
aud.addEventListener('loadedmetadata',()=>{document.getElementById('tTot').textContent=ft(aud.duration);hideLoad();});
aud.addEventListener('waiting',showLoad);aud.addEventListener('playing',hideLoad);
aud.addEventListener('error',()=>{hideLoad();toast('Cannot play — re-add the file');});
aud.addEventListener('ended',()=>{ST.repeat?(aud.currentTime=0,aud.play()):nextTrk();});
function showLoad(){document.getElementById('loadOv').classList.add('on');}
function hideLoad(){document.getElementById('loadOv').classList.remove('on');}

/* ═══════════════════════════════════════════════════
   PALETTE FROM COVER
═══════════════════════════════════════════════════ */
function applyPalette(coverUrl){
  const bg=document.getElementById('bgBlur');
  if(!coverUrl){bg.classList.remove('on');bg.style.backgroundImage='';return;}
  bg.style.backgroundImage=`url('${coverUrl}')`;
  bg.classList.add('on');
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=6;c.height=6;
    const x=c.getContext('2d');x.drawImage(img,0,0,6,6);
    try{
      const d=x.getImageData(0,0,6,6).data;
      let br=124,bg2=111,bb=255,bsat=0;
      for(let i=0;i<d.length;i+=4){if(d[i+3]<120)continue;const r=d[i],g=d[i+1],b=d[i+2],sat=Math.max(r,g,b)-Math.min(r,g,b);if(sat>bsat&&Math.max(r,g,b)>50){bsat=sat;br=r;bg2=g;bb=b;}}
      const ac=`${br},${bg2},${bb}`;
      const ac2=`${Math.min(255,255-br+100)},${Math.min(255,bb)},${Math.min(255,255-bg2+150)}`;
      document.documentElement.style.setProperty('--ac',`rgb(${ac})`);
      document.documentElement.style.setProperty('--ac2',`rgb(${ac2})`);
      document.documentElement.style.setProperty('--acg',`rgba(${ac},.12)`);
    }catch(e){}
  };
  img.src=coverUrl;
}

/* ═══════════════════════════════════════════════════
   ADD FILES
═══════════════════════════════════════════════════ */
const AEXTS=/\.(mp3|flac|wav|aac|ogg|m4a|opus|wma|aiff|ape)$/i;
async function addFiles(fileList){
  if(!fileList?.length)return;
  const files=Array.from(fileList).filter(f=>AEXTS.test(f.name)||f.type.startsWith('audio/'));
  if(!files.length){toast('No audio files found');return;}
  showLoad();let added=0;
  for(let i=0;i<files.length;i++){
    const file=files[i];
    if(LIBRARY.find(t=>t.file?.name===file.name&&!t.needsFile))continue;
    let meta={};try{meta=await Meta.parse(file);}catch(e){}
    const objectUrl=URL.createObjectURL(file);
    let dur=0;try{dur=await new Promise(r=>{const a=new Audio();a.preload='metadata';a.onloadedmetadata=()=>{r(a.duration||0);a.src='';};a.onerror=()=>r(0);a.src=objectUrl;setTimeout(()=>r(0),3000);});}catch(e){}
    LIBRARY.push({id:Math.random().toString(36).slice(2),title:meta.title,artist:meta.artist,album:meta.album,genre:meta.genre,year:meta.year,dur,cover:meta.coverUrl||'',file,objectUrl,needsFile:false});
    added++;
  }
  hideLoad();saveLib();updateLibStats();renderLib(document.getElementById('srch').value);
  if(added>0){toast(`${added} track${added===1?'':'s'} added`);if(ST.idx<0){const fi=LIBRARY.findIndex(t=>t.objectUrl&&!t.needsFile);if(fi>=0)loadIdx(fi,false);}}
  else toast('No new tracks added');
}

/* ═══════════════════════════════════════════════════
   LOAD & PLAY
═══════════════════════════════════════════════════ */
function loadIdx(idx,play=true){
  if(!LIBRARY.length)return;
  idx=((idx%LIBRARY.length)+LIBRARY.length)%LIBRARY.length;
  ST.idx=idx;const t=LIBRARY[idx];
  if(t.needsFile||!t.objectUrl){setMeta(t);setPlaying(false);toast('Re-add this file to play it');renderLib();return;}
  setMeta(t);applyPalette(t.cover);
  showLoad();aud.src=t.objectUrl;aud.load();
  if(play){ensureActx();if(actx?.state==='suspended')actx.resume();aud.play().then(()=>setPlaying(true)).catch(()=>{hideLoad();toast('Tap play');});}
  else setPlaying(false);
  renderLib(document.getElementById('srch').value);
}

function setMeta(t){
  document.getElementById('artImg').src=t.cover||'';
  document.getElementById('mpArt').src=t.cover||'';
  document.getElementById('tTitle').textContent=t.title||'Unknown';
  document.getElementById('tArtist').textContent=t.artist||'Unknown Artist';
  document.getElementById('mpT').textContent=t.title||'Unknown';
  document.getElementById('mpA').textContent=t.artist||'Unknown Artist';
  document.getElementById('tTot').textContent=ft(t.dur||0);
  document.getElementById('progFill').style.width='0%';
  document.getElementById('tNow').textContent='0:00';
  document.getElementById('btnLike').classList.toggle('on',ST.liked.has(ST.idx));
  const chips=[];
  if(t.genre)chips.push(`<span class="tchip">${esc(t.genre)}</span>`);
  if(t.year)chips.push(`<span class="tchip">${esc(t.year)}</span>`);
  document.getElementById('tChips').innerHTML=chips.join('');
}

function togglePlay(){
  ensureActx();if(actx?.state==='suspended')actx.resume();
  if(ST.idx<0){const fi=LIBRARY.findIndex(t=>t.objectUrl&&!t.needsFile);if(fi>=0)loadIdx(fi);else{toast('Add files first');goTab(1);}return;}
  const t=LIBRARY[ST.idx];if(t.needsFile||!t.objectUrl){toast('Re-add to play');return;}
  aud.paused?aud.play().then(()=>setPlaying(true)).catch(()=>{}):( aud.pause(),setPlaying(false));
}

function setPlaying(v){
  ST.playing=v;
  document.getElementById('app').classList.toggle('playing',v);
  const pi='<rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/>';
  const pp='<polygon points="5,3 19,12 5,21"/>';
  document.getElementById('playIco').innerHTML=v?pi:pp;
  document.getElementById('mpIco').innerHTML=v?pi:pp;
  document.getElementById('nowStatus').textContent=v?'NOW PLAYING':'PAUSED';
  /* Characters */
  if(v)startChars();else stopChars();
  renderLib(document.getElementById('srch').value);
}

function nextTrk(){
  if(!LIBRARY.length)return;
  const avail=LIBRARY.map((_,i)=>i).filter(i=>!LIBRARY[i].needsFile&&LIBRARY[i].objectUrl);
  if(!avail.length)return;
  if(ST.shuffle)loadIdx(avail[Math.floor(Math.random()*avail.length)]);
  else{let n=(ST.idx+1)%LIBRARY.length;loadIdx(n);}
}
function prevTrk(){if(aud.currentTime>4){aud.currentTime=0;return;}let p=(ST.idx-1+LIBRARY.length)%LIBRARY.length;loadIdx(p);}
function togShuffle(){ST.shuffle=!ST.shuffle;['btnShuffle','ctrlShuffle'].forEach(id=>document.getElementById(id)?.classList.toggle('on',ST.shuffle));toast(ST.shuffle?'Shuffle on':'Shuffle off');}
function togRepeat(){ST.repeat=!ST.repeat;['btnRepeat','ctrlRepeat'].forEach(id=>document.getElementById(id)?.classList.toggle('on',ST.repeat));toast(ST.repeat?'Repeat on':'Repeat off');}
function togLike(){if(ST.idx<0)return;ST.liked.has(ST.idx)?ST.liked.delete(ST.idx):ST.liked.add(ST.idx);document.getElementById('btnLike').classList.toggle('on',ST.liked.has(ST.idx));toast(ST.liked.has(ST.idx)?'Liked':'Removed from liked');}
function setVol(v){ST.vol=+v/100;aud.volume=ST.vol;document.getElementById('vv').textContent=v;document.getElementById('volSl').style.setProperty('--pv',v);}
setVol(80);

/* ═══════════════════════════════════════════════════
   SEEKING
═══════════════════════════════════════════════════ */
function doSeek(p){if(!aud.duration)return;aud.currentTime=p*aud.duration;document.getElementById('progFill').style.width=(p*100).toFixed(2)+'%';document.getElementById('tNow').textContent=ft(aud.currentTime);}
function seekC(e){const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));}
function seekT(e){e.preventDefault();const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.touches[0].clientX-r.left)/r.width)));}
function wvSeek(e){const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));}
function wvTouch(e){e.preventDefault();const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.touches[0].clientX-r.left)/r.width)));}

/* ═══════════════════════════════════════════════════
   WAVEFORM
═══════════════════════════════════════════════════ */
let wvT=0;
function drawWave(){
  const cvs=document.getElementById('wvCvs');
  const W=cvs.offsetWidth||380;if(cvs.width!==W){cvs.width=W;cvs.height=48;}
  const ctx=cvs.getContext('2d');ctx.clearRect(0,0,W,48);
  const cs=getComputedStyle(document.documentElement);
  const ac=cs.getPropertyValue('--ac').trim()||'#7c6fff';
  const ac2=cs.getPropertyValue('--ac2').trim()||'#ff6fb0';
  const prog=aud.duration?aud.currentTime/aud.duration:0;
  if(analyser&&ST.playing){
    analyser.getByteFrequencyData(wvData);
    const bars=60,bw=W/bars;
    for(let i=0;i<bars;i++){
      const v=wvData[Math.floor(i*wvData.length/bars)]/255;
      const h=Math.max(3,v*44);
      const played=(i/bars)<=prog;
      ctx.fillStyle=played?ac:ac2;
      ctx.globalAlpha=played?.85:.2;
      ctx.beginPath();ctx.roundRect(i*bw+1,48-h,bw-2,h,2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }else{
    ctx.beginPath();
    for(let x=0;x<W;x++){
      const amp=(ST.playing?10:3)*(.5+.5*Math.sin(x*.04+wvT*.06));
      const y=24+Math.sin(x*.035+wvT*.045)*amp+Math.sin(x*.09-wvT*.035)*amp*.4;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    const g=ctx.createLinearGradient(0,0,W,0);
    g.addColorStop(0,ac+'22');
    g.addColorStop(Math.max(0,Math.min(1,prog)),ac);
    g.addColorStop(Math.min(1,prog+.01),ac2+'44');
    g.addColorStop(1,ac2+'22');
    ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();
  }
  wvT+=ST.playing?.06:.015;
}
setInterval(drawWave,33);

/* ═══════════════════════════════════════════════════
   CHARACTER SYSTEM
═══════════════════════════════════════════════════ */
const CHARS=['cJakara','cSpyra','cCrashina','cSonia','cMarie','cTinette'];
const MOVES=['m-bounce','m-spin','m-freeze','m-wave','m-slide'];
const ALL_MOVES=[...MOVES,'m-idle'];
let charTimers=[];
let activeChar=0;

function clearCharMoves(el){ALL_MOVES.forEach(m=>el.classList.remove(m));}

function startChars(){
  stopChars();
  showChar(Math.floor(Math.random()*CHARS.length));
  // Cycle character every 8s
  charTimers.push(setInterval(()=>{showChar(Math.floor(Math.random()*CHARS.length));},8000));
  // Cycle move every 1.8s
  charTimers.push(setInterval(()=>{
    const el=document.getElementById(CHARS[activeChar]);
    if(el){clearCharMoves(el);el.classList.add(MOVES[Math.floor(Math.random()*MOVES.length)]);}
  },1800));
}
function stopChars(){
  charTimers.forEach(clearInterval);charTimers=[];
  CHARS.forEach(id=>{const el=document.getElementById(id);if(el){clearCharMoves(el);el.classList.remove('visible');el.classList.add('m-idle');}});
}
function showChar(idx){
  CHARS.forEach((id,i)=>{
    const el=document.getElementById(id);if(!el)return;
    clearCharMoves(el);
    if(i===idx){el.classList.add('visible');el.classList.add('m-bounce');}
    else{el.classList.remove('visible');el.classList.add('m-idle');}
  });
  activeChar=idx;
}

/* ═══════════════════════════════════════════════════
   LIBRARY RENDER
═══════════════════════════════════════════════════ */
function updateLibStats(){document.getElementById('libStats').textContent=`${LIBRARY.length} track${LIBRARY.length===1?'':'s'}`;}

function renderLib(q=''){
  updateLibStats();
  const list=document.getElementById('trkList');
  const q2=q.toLowerCase();
  const rows=LIBRARY.map((t,i)=>({t,i})).filter(({t})=>!q2||(t.title+t.artist+(t.album||'')).toLowerCase().includes(q2));
  if(!LIBRARY.length){list.innerHTML=`<div class="lib-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><p>No tracks yet.<br>Tap Add Files or drag &amp; drop audio here.</p></div>`;return;}
  if(!rows.length){list.innerHTML=`<div class="lib-empty"><p>No results for "${esc(q)}"</p></div>`;return;}
  list.innerHTML=rows.map(({t,i},ri)=>{
    const on=i===ST.idx,nf=t.needsFile||!t.objectUrl;
    const numEl=on&&ST.playing?'<div class="pbars"><div class="pbar"></div><div class="pbar"></div><div class="pbar"></div></div>':`<span style="font-family:var(--mono);font-size:10px">${String(i+1).padStart(2,'0')}</span>`;
    return`<div class="trk${on?' on':''}${nf?' nf':''}" onclick="loadIdx(${i})" oncontextmenu="openCtx(event,${i})" style="${nf?'opacity:.45':''}animation-delay:${ri*12}ms">
      <div class="trk-n">${numEl}</div>
      <img class="trk-art" src="${t.cover||''}" alt="" onerror="this.style.visibility='hidden'">
      <div class="trk-info">
        <div class="trk-name">${esc(t.title||'Unknown')}${nf?' <span style="font-size:9px;opacity:.5">(re-add)</span>':''}</div>
        <div class="trk-sub">${esc(t.artist||'Unknown')}${t.album?' · '+esc(t.album):''}</div>
      </div>
      <div class="trk-dur">${ft(t.dur||0)}</div>
      <button class="trk-del" onclick="event.stopPropagation();removeTrk(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      </button>
    </div>`;
  }).join('');
}

function removeTrk(i){
  if(LIBRARY[i]?.objectUrl)URL.revokeObjectURL(LIBRARY[i].objectUrl);
  LIBRARY.splice(i,1);
  if(ST.idx===i){aud.pause();setPlaying(false);ST.idx=-1;}
  else if(ST.idx>i)ST.idx--;
  saveLib();renderLib(document.getElementById('srch').value);
}

/* ═══════════════════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════════════════ */
function openCtx(e,trkIdx){
  e.preventDefault();e.stopPropagation();
  ctxTrkIdx=trkIdx;
  const m=document.getElementById('ctx');
  const plItems=Object.entries(PLAYLISTS).map(([id,pl])=>`<div class="ctx-item" onclick="addTrkToPl('${id}',${trkIdx});closeCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>${esc(pl.name)}</div>`).join('');
  m.innerHTML=`
    <div class="ctx-item" onclick="loadIdx(${trkIdx});closeCtx()"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>Play now</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="openPlPicker(${trkIdx});closeCtx()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><path d="M9 9l12-2"/></svg>Add to playlist…</div>
    ${plItems?'<div class="ctx-sep"></div>'+plItems:''}
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="removeTrk(${trkIdx});closeCtx()" style="color:#ff6b6b"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>Remove</div>`;
  const appRect=document.getElementById('app').getBoundingClientRect();
  let x=e.clientX-appRect.left,y=e.clientY-appRect.top;
  if(x+190>appRect.width)x=appRect.width-196;
  if(y+200>appRect.height)y=y-200;
  m.style.left=x+'px';m.style.top=y+'px';
  m.classList.add('on');
}
function closeCtx(){document.getElementById('ctx').classList.remove('on');}
document.addEventListener('click',()=>closeCtx());

   PLAYLIST ENGINE
═══════════════════════════════════════════════════ */
function openNewPl(){document.getElementById('plNameIn').value='';document.getElementById('plModal').classList.add('on');setTimeout(()=>document.getElementById('plNameIn').focus(),100);}
function closePlModal(){document.getElementById('plModal').classList.remove('on');}
function createPl(){
  const name=document.getElementById('plNameIn').value.trim();
  if(!name)return;
  const id='pl_'+Date.now();
  PLAYLISTS[id]={name,trackIds:[]};
  savePls();renderPlaylists();closePlModal();toast(`Playlist "${name}" created`);
}

function renderPlaylists(){
  const list=document.getElementById('plList');
  const pls=Object.entries(PLAYLISTS);
  const cards=pls.map(([id,pl])=>{
    const tracks=pl.trackIds.map(tid=>LIBRARY.find(t=>t.id===tid)).filter(Boolean);
    const covers=tracks.slice(0,4).map(t=>t.cover?`<img src="${t.cover}" alt="">`:
      `<div class="pl-art-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`).join('');
    const ac=id===currentPlId?' active-pl':'';
    return`<div class="pl-card${ac}" onclick="openPlDetail('${id}')">
      <div class="pl-art">${covers||'<div class="pl-art-empty" style="grid-column:span 2;grid-row:span 2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>'}</div>
      <div class="pl-info">
        <div class="pl-name">${esc(pl.name)}</div>
        <div class="pl-ct">${tracks.length} track${tracks.length===1?'':'s'}</div>
      </div>
      <div class="pl-actions">
        <button class="pl-btn" onclick="event.stopPropagation();playPlaylist('${id}',false)" title="Play"><svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><polygon points="5,3 19,12 5,21"/></svg></button>
        <button class="pl-btn" onclick="event.stopPropagation();deletePl('${id}')" title="Delete" style="color:#ff6b6b"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      </div>
    </div>`;
  }).join('');
  list.innerHTML=document.getElementById('newPlCard').outerHTML+cards;
  // Re-attach event
  document.getElementById('newPlCard').onclick=openNewPl;
}

function openPlDetail(id){
  currentPlId=id;
  const pl=PLAYLISTS[id];if(!pl)return;
  document.getElementById('plDetailName').textContent=pl.name;
  renderPlDetail();
  const det=document.getElementById('plDetail');
  det.classList.add('on');
  requestAnimationFrame(()=>det.classList.add('slide-in'));
}
function closePlDetail(){
  const det=document.getElementById('plDetail');
  det.classList.remove('slide-in');
  setTimeout(()=>det.classList.remove('on'),300);
}
function renderPlDetail(){
  const pl=PLAYLISTS[currentPlId];if(!pl)return;
  const tracks=pl.trackIds.map((tid,i)=>({t:LIBRARY.find(t=>t.id===tid),i,tid})).filter(x=>x.t);
  document.getElementById('plDetailList').innerHTML=tracks.length
    ?tracks.map(({t,i,tid},ri)=>`
      <div class="trk${LIBRARY.indexOf(t)===ST.idx?' on':''}" onclick="playFromPl('${currentPlId}','${tid}')" style="animation-delay:${ri*10}ms">
        <div class="trk-n"><span style="font-family:var(--mono);font-size:10px">${String(ri+1).padStart(2,'0')}</span></div>
        <img class="trk-art" src="${t.cover||''}" alt="" onerror="this.style.visibility='hidden'">
        <div class="trk-info"><div class="trk-name">${esc(t.title||'Unknown')}</div><div class="trk-sub">${esc(t.artist||'Unknown')}</div></div>
        <div class="trk-dur">${ft(t.dur||0)}</div>
        <button class="trk-del" onclick="event.stopPropagation();removeTrkFromPl('${currentPlId}','${tid}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`).join('')
    :`<div class="lib-empty"><p>This playlist is empty.<br>Right-click a track in Library to add it.</p></div>`;
}

function addTrkToPl(plId,trkIdx){
  const pl=PLAYLISTS[plId];if(!pl)return;
  const tid=LIBRARY[trkIdx]?.id;if(!tid)return;
  if(pl.trackIds.includes(tid)){toast('Already in playlist');return;}
  pl.trackIds.push(tid);savePls();renderPlaylists();
  if(currentPlId===plId)renderPlDetail();
  toast(`Added to "${pl.name}"`);
}
function removeTrkFromPl(plId,tid){
  const pl=PLAYLISTS[plId];if(!pl)return;
  pl.trackIds=pl.trackIds.filter(t=>t!==tid);savePls();renderPlDetail();renderPlaylists();
}
function deletePl(id){
  const pl=PLAYLISTS[id];if(!pl)return;
  delete PLAYLISTS[id];savePls();renderPlaylists();
  if(currentPlId===id)closePlDetail();
  toast('Playlist deleted');
}
function playPlaylist(plId,shuffle){
  const pl=PLAYLISTS[plId];if(!pl||!pl.trackIds.length){toast('Playlist is empty');return;}
  ST.shuffle=shuffle;
  if(shuffle)document.getElementById('btnShuffle')?.classList.add('on');
  const ids=shuffle?[...pl.trackIds].sort(()=>Math.random()-.5):pl.trackIds;
  const first=LIBRARY.findIndex(t=>t.id===ids[0]);
  if(first>=0)loadIdx(first);
  closePlDetail();goTab(0);
}
function playFromPl(plId,tid){
  const idx=LIBRARY.findIndex(t=>t.id===tid);if(idx>=0)loadIdx(idx);closePlDetail();goTab(0);
}

/* Playlist picker (add to playlist from track long-press) */
function openPlPicker(trkIdx){
  ctxTrkIdx=trkIdx;
  const t=LIBRARY[trkIdx];if(!t)return;
  document.getElementById('pickerTrkName').textContent=t.title||'Unknown';
  const pls=Object.entries(PLAYLISTS);
  document.getElementById('pickerPlList').innerHTML=pls.length
    ?pls.map(([id,pl])=>`<div class="picker-pl" onclick="addTrkToPl('${id}',${trkIdx});closePlPicker()"><div class="picker-pl-ico">${pl.trackIds.slice(0,1).map(tid=>{const lt=LIBRARY.find(t=>t.id===tid);return lt?.cover?`<img src="${lt.cover}" alt="">`:'';}).join('')||`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/></svg>`}</div><div class="picker-pl-name">${esc(pl.name)}</div></div>`).join('')
    :`<div style="padding:12px;font-size:12px;color:var(--dim);text-align:center">No playlists yet. Create one first.</div>`;
  document.getElementById('plPicker').classList.add('on');
}
function closePlPicker(){document.getElementById('plPicker').classList.remove('on');}
document.getElementById('plNameIn').addEventListener('keydown',e=>{if(e.key==='Enter')createPl();});

/* ═══════════════════════════════════════════════════
   TABS + NAV
═══════════════════════════════════════════════════ */
let curTab=0;
function goTab(idx){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  const pages=['pgNow','pgLib','pgPlaylists'];
  document.getElementById(pages[idx]).classList.add('on');
  document.getElementById('nav'+idx).classList.add('on');
  document.getElementById('tab'+idx).classList.add('on');
  document.getElementById('mini').classList.toggle('on',idx!==0&&ST.idx>=0);
  curTab=idx;
  if(idx===1)renderLib(document.getElementById('srch').value);
  if(idx===2)renderPlaylists();
}

/* ═══════════════════════════════════════════════════
   DRAG & DROP
═══════════════════════════════════════════════════ */
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);});

/* ═══════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')aud.currentTime=Math.min(aud.duration||0,aud.currentTime+10);
  if(e.code==='ArrowLeft')aud.currentTime=Math.max(0,aud.currentTime-10);
  if(e.code==='ArrowUp'){const v=Math.min(100,+document.getElementById('volSl').value+5);document.getElementById('volSl').value=v;setVol(v);}
  if(e.code==='ArrowDown'){const v=Math.max(0,+document.getElementById('volSl').value-5);document.getElementById('volSl').value=v;setVol(v);}
  if(e.code==='KeyN')nextTrk();if(e.code==='KeyP')prevTrk();
  if(e.key==='Escape'){closeCtx();closePlModal();closePlPicker();closePlDetail();}
});

/* ═══════════════════════════════════════════════════
   TOAST + UTILS
═══════════════════════════════════════════════════ */
let toastT=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2200);}
function ft(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
loadLib();loadPls();updateLibStats();renderLib();renderPlaylists();
</script>
</body>
</html>
