<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CHROMATIC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@100;200;300;400;900&family=Archivo+Narrow:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
:root{
  --c0:#000005;
  --p:255,60,120;   /* primary — changes per track */
  --s:80,200,255;   /* secondary */
  --a:220,255,80;   /* accent */
  --glass:rgba(255,255,255,.04);
  --glass-border:rgba(255,255,255,.09);
  --glass-hover:rgba(255,255,255,.09);
  --display:'Bebas Neue',sans-serif;
  --body:'Archivo',sans-serif;
  --narrow:'Archivo Narrow',sans-serif;
  --ease:cubic-bezier(.19,1,.22,1);
  --ease-back:cubic-bezier(.34,1.56,.64,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--c0);font-family:var(--body)}

/* ── CINEMATIC BG ── */
#bg{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background:var(--c0);
  transition:background 1.5s var(--ease);
}
#bg-art{
  position:absolute;inset:-20%;
  background-size:cover;background-position:center;
  filter:blur(60px) saturate(1.8) brightness(.35);
  transition:background-image 1.2s var(--ease),opacity .8s;
  opacity:0;
}
#bg-art.loaded{opacity:1}
#bg-vignette{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 60% at 50% 100%,rgba(0,0,5,.95) 0%,transparent 70%),
    radial-gradient(ellipse 100% 40% at 50% 0%,rgba(0,0,5,.7) 0%,transparent 60%),
    radial-gradient(ellipse 40% 100% at 0% 50%,rgba(0,0,5,.5) 0%,transparent 50%),
    radial-gradient(ellipse 40% 100% at 100% 50%,rgba(0,0,5,.5) 0%,transparent 50%);
}
/* Animated color orbs */
#orb1,#orb2{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:orbdrift 12s ease-in-out infinite}
#orb1{width:60vw;height:60vw;top:-10%;left:-10%;background:rgba(var(--p),.25);animation-delay:0s}
#orb2{width:50vw;height:50vw;bottom:-10%;right:-10%;background:rgba(var(--s),.2);animation-delay:-6s}
@keyframes orbdrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,8%) scale(1.05)}66%{transform:translate(-4%,-5%) scale(.95)}}

/* ── GRAIN OVERLAY ── */
#grain{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
  animation:grainshift 1s steps(2) infinite;
}
@keyframes grainshift{0%{transform:translate(0,0)}25%{transform:translate(-2%,-1%)}50%{transform:translate(1%,2%)}75%{transform:translate(-1%,1%)}100%{transform:translate(2%,-2%)}}

/* ── APP ── */
#app{
  position:relative;z-index:10;
  width:100%;height:100dvh;
  max-width:430px;margin:0 auto;
  display:flex;flex-direction:column;
  overflow:hidden;
}
@media(min-width:430px){
  #app{border-left:1px solid rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.04)}
}

/* ── HIDDEN FILE INPUTS ── */
#fpAudio,#fpFolder{display:none}

/* ── HEADER ── */
#hdr{
  flex-shrink:0;
  padding:20px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:var(--display);font-size:11px;letter-spacing:6px;
  color:rgba(255,255,255,.2);
}
.hdr-btns{display:flex;gap:8px}
.hdr-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--glass-border);background:var(--glass);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s var(--ease);color:rgba(255,255,255,.4);
  -webkit-appearance:none;
}
.hdr-btn:hover,.hdr-btn:active{background:var(--glass-hover);color:#fff;border-color:rgba(255,255,255,.2)}
.hdr-btn.on{border-color:rgba(var(--a),.6);color:rgba(var(--a),1);background:rgba(var(--a),.08)}
.hdr-btn svg{width:15px;height:15px;display:block}

/* ── PAGES ── */
#pages{flex:1;position:relative;overflow:hidden}
.page{display:none;flex-direction:column;width:100%;height:100%;overflow:hidden}
.page.on{display:flex}

/* ═══════════════════════════════════
   NOW PLAYING — full bleed cinematic
═══════════════════════════════════ */
#pgNow{position:relative}

/* GIANT TRACK NUMBER — background texture */
#trkNumBg{
  position:absolute;top:-5%;right:-5%;
  font-family:var(--display);font-size:52vw;line-height:1;
  color:rgba(255,255,255,.02);letter-spacing:-10px;
  pointer-events:none;z-index:0;
  transition:opacity .6s;
}

/* CONTENT */
#nowContent{
  position:relative;z-index:1;
  flex:1;display:flex;flex-direction:column;
  padding:16px 20px 0;
}

/* ALBUM ART — small circle, top right */
#artWrap{
  position:absolute;top:0;right:0;
  width:min(140px,35vw);height:min(140px,35vw);
  border-radius:50%;overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,.08),0 20px 60px rgba(0,0,0,.5);
  transition:transform .6s var(--ease);
  cursor:pointer;
}
.playing #artWrap{animation:spinart 20s linear infinite}
@keyframes spinart{to{transform:rotate(360deg)}}
#artImg{width:100%;height:100%;object-fit:cover;display:block}
#artCenter{
  position:absolute;inset:35%;border-radius:50%;
  background:rgba(0,0,5,.8);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
}

/* TRACK TITLE — huge, editorial, overlapping */
#titleBlock{
  margin-top:auto;
  padding-bottom:4px;
}
#tArtist{
  font-family:var(--narrow);font-size:10px;letter-spacing:4px;font-weight:400;
  color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:6px;
}
#tTitle{
  font-family:var(--display);
  font-size:clamp(48px,16vw,82px);
  line-height:.9;letter-spacing:-1px;
  color:#fff;
  text-shadow:0 0 80px rgba(var(--p),.4);
  transition:text-shadow .8s var(--ease);
  /* overflow: allow it to breathe */
  word-break:break-word;
}
#tAlbum{
  font-family:var(--narrow);font-size:10px;letter-spacing:3px;
  color:rgba(255,255,255,.2);margin-top:8px;font-weight:400;
}
.tchip{
  display:inline-block;padding:3px 10px;border-radius:2px;
  font-family:var(--narrow);font-size:9px;letter-spacing:2px;font-weight:700;
  background:rgba(var(--a),.12);color:rgba(var(--a),1);
  border:1px solid rgba(var(--a),.25);margin-right:5px;margin-top:6px;
}

/* ── WAVEFORM ── */
#wvWrap{
  flex-shrink:0;
  padding:16px 0 8px;
  cursor:pointer;
  position:relative;
}
#wvCvs{display:block;width:100%;height:52px}

/* ── PROGRESS ── */
#progWrap{flex-shrink:0;padding:0 0 12px}
#progRail{
  width:100%;height:24px;
  display:flex;align-items:center;
  cursor:pointer;touch-action:none;
}
#progTrack{
  width:100%;height:2px;
  background:rgba(255,255,255,.08);
  border-radius:1px;position:relative;
}
#progFill{
  height:100%;border-radius:1px;
  background:linear-gradient(90deg,rgba(var(--p),1),rgba(var(--a),1));
  position:relative;transition:width .08s linear;max-width:100%;
}
#progHead{
  position:absolute;right:-5px;top:-4px;
  width:10px;height:10px;border-radius:50%;
  background:#fff;box-shadow:0 0 10px rgba(var(--p),1);
  opacity:0;transition:opacity .18s;pointer-events:none;
}
#progRail:hover #progHead{opacity:1}
.times{
  display:flex;justify-content:space-between;
  font-family:var(--narrow);font-size:10px;
  color:rgba(255,255,255,.25);letter-spacing:1px;
  margin-top:4px;
}

/* ── CONTROLS ── */
#ctrlRow{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 0 16px;gap:8px;
}
.ctrl{
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.35);transition:all .18s var(--ease);
  -webkit-appearance:none;border-radius:50%;
  width:44px;height:44px;
}
.ctrl:hover,.ctrl:active{color:#fff}
.ctrl:active{transform:scale(.86)}
.ctrl.on{color:rgba(var(--a),1)}
.ctrl svg{display:block}

#playBtn{
  width:68px;height:68px;border-radius:50%;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;
  position:relative;
  background:linear-gradient(135deg,rgba(var(--p),.9),rgba(var(--s),.7));
  box-shadow:0 0 0 1px rgba(255,255,255,.1),0 8px 32px rgba(var(--p),.4),0 0 60px rgba(var(--p),.2);
  transition:transform .15s var(--ease-back),box-shadow .3s;
  color:#fff;
}
#playBtn:active{transform:scale(.9)}
#playBtn:hover{transform:scale(1.08);box-shadow:0 0 0 1px rgba(255,255,255,.15),0 12px 40px rgba(var(--p),.6),0 0 80px rgba(var(--p),.3)}
.playing #playBtn{animation:playpulse 2s ease-in-out infinite}
@keyframes playpulse{0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,.1),0 8px 32px rgba(var(--p),.4),0 0 60px rgba(var(--p),.2)}50%{box-shadow:0 0 0 1px rgba(255,255,255,.15),0 8px 40px rgba(var(--p),.7),0 0 100px rgba(var(--p),.4)}}
#playBtn svg{width:28px;height:28px;display:block;margin-left:3px}
#playBtn.paused svg{margin-left:3px}
#playBtn.playing svg{margin-left:0}

/* ── VOLUME ── */
#volWrap{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:0 0 20px;
}
.vico{color:rgba(255,255,255,.2);display:flex;align-items:center}
.vico svg{width:14px;height:14px;display:block}
input[type=range]{
  flex:1;-webkit-appearance:none;height:2px;border-radius:1px;
  background:linear-gradient(to right,rgba(var(--a),.7) calc(var(--p2,85)*1%),rgba(255,255,255,.08) calc(var(--p2,85)*1%));
  cursor:pointer;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#fff;cursor:pointer;box-shadow:0 0 8px rgba(var(--a),.6);
  transition:transform .15s;
}
input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.3)}
.vval{font-family:var(--narrow);font-size:10px;color:rgba(255,255,255,.2);min-width:22px;text-align:right;letter-spacing:1px}

/* ── LOAD OVERLAY ── */
#loadOverlay{
  position:absolute;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(0,0,5,.7);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#loadOverlay.show{opacity:1}
.spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,.08);border-top-color:rgba(var(--p),1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loadtxt{font-family:var(--narrow);font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.3)}

/* ═══════════════════════════════════
   LIBRARY
═══════════════════════════════════ */
#pgLib{background:rgba(0,0,5,.5);backdrop-filter:blur(30px)}

#libHdr{
  flex-shrink:0;padding:20px 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.lib-wordmark{font-family:var(--display);font-size:28px;letter-spacing:2px;color:#fff}
.add-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:2px;
  border:1px solid rgba(var(--a),.35);background:rgba(var(--a),.08);
  color:rgba(var(--a),1);font-family:var(--narrow);font-size:10px;font-weight:700;
  letter-spacing:2px;cursor:pointer;transition:all .18s;-webkit-appearance:none;
}
.add-btn:hover,.add-btn:active{background:rgba(var(--a),.18);border-color:rgba(var(--a),.6)}
.add-btn svg{width:12px;height:12px;display:block}

/* ADD MENU */
#addMenu{
  flex-shrink:0;margin:0 20px;overflow:hidden;
  max-height:0;transition:max-height .3s var(--ease);
}
#addMenu.open{max-height:200px}
.add-option{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);border-radius:2px;
  cursor:pointer;transition:all .15s;margin-bottom:2px;
  -webkit-appearance:none;color:#fff;font-family:var(--body);
  width:100%;text-align:left;
}
.add-option:hover,.add-option:active{background:rgba(255,255,255,.07)}
.add-option svg{width:16px;height:16px;display:block;color:rgba(var(--a),1);flex-shrink:0}
.add-opt-label{font-family:var(--narrow);font-size:13px;font-weight:700;letter-spacing:.5px}
.add-opt-sub{font-family:var(--narrow);font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px;margin-top:2px}

/* SEARCH */
#srchWrap{flex-shrink:0;padding:12px 20px 8px;position:relative}
#srch{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);border-radius:2px;
  padding:10px 14px 10px 36px;color:#fff;
  font-family:var(--narrow);font-size:13px;letter-spacing:.5px;outline:none;
  transition:border-color .2s;-webkit-appearance:none;
}
#srch:focus{border-color:rgba(255,255,255,.15)}
#srch::placeholder{color:rgba(255,255,255,.18)}
.srch-ico{position:absolute;left:34px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);pointer-events:none}
.srch-ico svg{width:14px;height:14px;display:block}

/* TRACK LIST */
#trkScroll{flex:1;overflow-y:auto;padding:0 20px 20px;scrollbar-width:none}
#trkScroll::-webkit-scrollbar{display:none}
#trkList{display:flex;flex-direction:column;gap:1px}

.trk{
  display:grid;
  grid-template-columns:32px 48px 1fr auto auto;
  align-items:center;gap:12px;
  padding:10px 12px;border-radius:2px;
  cursor:pointer;transition:background .15s;min-height:66px;
  position:relative;
}
.trk:hover,.trk:active{background:rgba(255,255,255,.04)}
.trk.on{background:rgba(var(--p),.08)}
.trk.on .trk-name{color:rgba(var(--p),1)}
.trk.on::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,rgba(var(--p),1),rgba(var(--a),1));
  border-radius:0 1px 1px 0;
}
.trk-num{font-family:var(--display);font-size:14px;color:rgba(255,255,255,.15);text-align:center;line-height:1}
.trk-num.playing-ic{display:flex;align-items:center;justify-content:center}
.trk-art{width:48px;height:48px;border-radius:2px;object-fit:cover;display:block;background:rgba(255,255,255,.04)}
.trk-info{min-width:0}
.trk-name{font-family:var(--narrow);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;transition:color .2s;letter-spacing:.3px}
.trk-meta{font-family:var(--narrow);font-size:11px;color:rgba(255,255,255,.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;letter-spacing:.3px}
.trk-dur{font-family:var(--narrow);font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px;flex-shrink:0}
.trk-del{
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.12);width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s,background .15s;flex-shrink:0;-webkit-appearance:none;
  opacity:0;
}
.trk:hover .trk-del{opacity:1}
.trk-del:hover{color:rgba(255,100,100,1);background:rgba(255,100,100,.1)}
.trk-del svg{width:13px;height:13px;display:block}

/* EMPTY STATE */
.lib-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:60px 20px;text-align:center;flex:1;
}
.lib-empty-icon{font-family:var(--display);font-size:80px;line-height:1;color:rgba(255,255,255,.04);letter-spacing:-2px}
.lib-empty p{font-family:var(--narrow);font-size:13px;color:rgba(255,255,255,.25);line-height:1.8;letter-spacing:.5px}
.lib-empty-btn{
  display:flex;align-items:center;gap:8px;padding:12px 24px;
  border:1px solid rgba(var(--a),.35);background:rgba(var(--a),.08);
  color:rgba(var(--a),1);font-family:var(--narrow);font-size:12px;font-weight:700;
  letter-spacing:2px;cursor:pointer;-webkit-appearance:none;transition:all .18s;border-radius:2px;
}
.lib-empty-btn:hover{background:rgba(var(--a),.18)}
.lib-empty-btn svg{width:14px;height:14px;display:block}

/* ── NAV BAR ── */
#nav{
  flex-shrink:0;
  display:flex;
  border-top:1px solid rgba(255,255,255,.05);
  background:rgba(0,0,5,.6);backdrop-filter:blur(20px);
  position:relative;z-index:20;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:12px 8px;cursor:pointer;
  border:none;background:none;-webkit-appearance:none;
  color:rgba(255,255,255,.2);transition:color .2s;
  font-family:var(--narrow);font-size:9px;letter-spacing:2px;font-weight:700;text-transform:uppercase;
}
.nav-btn:active{opacity:.7}
.nav-btn.on{color:rgba(var(--a),1)}
.nav-btn svg{width:20px;height:20px;display:block}
.nav-indicator{
  position:absolute;bottom:0;height:2px;
  background:linear-gradient(90deg,rgba(var(--p),1),rgba(var(--a),1));
  border-radius:1px;transition:left .3s var(--ease),width .3s var(--ease);
}

/* ── MINI PLAYER ── */
#mini{
  position:relative;z-index:20;
  margin:0 12px 8px;border-radius:3px;
  background:rgba(10,10,20,.8);border:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(20px);
  padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;
}
#mini.hidden{display:none}
#mini::before{
  content:'';position:absolute;inset:0;border-radius:3px;
  background:linear-gradient(90deg,rgba(var(--p),.08),transparent);
  pointer-events:none;
}
.mp-art{width:42px;height:42px;border-radius:2px;flex-shrink:0;object-fit:cover;background:rgba(255,255,255,.04)}
.mp-info{flex:1;min-width:0}
.mp-t{font-family:var(--narrow);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;letter-spacing:.3px}
.mp-a{font-family:var(--narrow);font-size:10px;color:rgba(255,255,255,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;letter-spacing:.5px}
.mp-ctrls{display:flex;align-items:center;gap:4px;flex-shrink:0}
.mp-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color .15s;-webkit-appearance:none}
.mp-btn:hover,.mp-btn:active{color:#fff}
.mp-btn svg{width:18px;height:18px;display:block}
.mp-prog{position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.05);border-radius:0 0 3px 3px;overflow:hidden}
.mp-fill{height:100%;background:linear-gradient(90deg,rgba(var(--p),1),rgba(var(--a),1));transition:width .1s linear}

/* ── TOAST ── */
#toast{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%) translateY(4px);
  z-index:50;padding:8px 18px;border-radius:2px;
  background:rgba(20,20,30,.95);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.7);font-family:var(--narrow);font-size:11px;letter-spacing:1.5px;
  opacity:0;transition:all .25s var(--ease);pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PROCESSING ── */
#proc{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:50;padding:8px 18px;border-radius:2px;
  background:rgba(20,20,30,.95);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.4);font-family:var(--narrow);font-size:11px;letter-spacing:1.5px;
  display:none;align-items:center;gap:10px;pointer-events:none;
}
#proc.show{display:flex}
#proc .spinner{width:12px;height:12px;border-width:1.5px}

/* ── PLAYING BARS ANIMATION ── */
.bars{display:flex;align-items:flex-end;gap:2px;height:14px}
.bar{width:2px;border-radius:1px;background:rgba(var(--p),1);animation:barbeat .8s ease-in-out infinite}
.bar:nth-child(2){animation-delay:.15s;height:8px}
.bar:nth-child(3){animation-delay:.3s;height:12px}
.bar:nth-child(1){height:10px}
@keyframes barbeat{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

/* ═══════════════════════════════════
   CHARACTER STAGE
═══════════════════════════════════ */
#charStage{
  flex-shrink:0;
  height:110px;
  position:relative;
  overflow:hidden;
  margin:0 0 4px;
}
/* Ground line */
#charStage::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:1px;background:rgba(255,255,255,.06);
}
/* Shadow under each character */
.char-shadow{
  position:absolute;bottom:2px;
  width:40px;height:6px;border-radius:50%;
  background:rgba(0,0,0,.35);
  filter:blur(3px);
  left:50%;transform:translateX(-50%);
  transition:opacity .4s;
}
/* Character wrapper — positions the SVG */
.char{
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  display:none;
  flex-direction:column;
  align-items:center;
}
.char.active{display:flex}

/* ── BREAKDANCE MOVES ── */
/* Character SVGs share these animation classes */
@keyframes bboy-spin{
  0%{transform:translateX(-50%) rotate(0deg)}
  100%{transform:translateX(-50%) rotate(360deg)}
}
@keyframes bboy-freeze{
  0%,100%{transform:translateX(-50%) rotate(-20deg) scaleX(-1)}
  50%{transform:translateX(-50%) rotate(20deg) scaleX(-1)}
}
@keyframes bboy-bounce{
  0%,100%{transform:translateX(-50%) translateY(0) scaleX(1)}
  25%{transform:translateX(-54%) translateY(-18px) scaleX(1)}
  50%{transform:translateX(-46%) translateY(-8px) scaleX(-1)}
  75%{transform:translateX(-50%) translateY(-22px) scaleX(1)}
}
@keyframes bboy-windmill{
  0%{transform:translateX(-50%) rotate(0deg) scale(1)}
  25%{transform:translateX(-50%) rotate(90deg) scale(.9)}
  50%{transform:translateX(-50%) rotate(180deg) scale(1.1)}
  75%{transform:translateX(-50%) rotate(270deg) scale(.9)}
  100%{transform:translateX(-50%) rotate(360deg) scale(1)}
}
@keyframes bboy-toprock{
  0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg)}
  20%{transform:translateX(-54%) translateY(-6px) rotate(-8deg)}
  40%{transform:translateX(-46%) translateY(-10px) rotate(6deg)}
  60%{transform:translateX(-52%) translateY(-4px) rotate(-4deg)}
  80%{transform:translateX(-48%) translateY(-8px) rotate(5deg)}
}
@keyframes bboy-headspin{
  0%{transform:translateX(-50%) rotate(0deg) translateY(0)}
  50%{transform:translateX(-50%) rotate(180deg) translateY(-5px)}
  100%{transform:translateX(-50%) rotate(360deg) translateY(0)}
}
@keyframes idle-bob{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(-4px)}
}

/* Move variations applied to .char when playing */
.char.move-bounce{animation:bboy-bounce .7s ease-in-out infinite}
.char.move-spin{animation:bboy-spin .6s linear infinite}
.char.move-freeze{animation:bboy-freeze 1.2s ease-in-out infinite}
.char.move-windmill{animation:bboy-windmill .8s linear infinite}
.char.move-toprock{animation:bboy-toprock .9s ease-in-out infinite}
.char.move-headspin{animation:bboy-headspin .5s linear infinite}
.char.move-idle{animation:idle-bob 1.4s ease-in-out infinite}

/* ── LIMB ANIMATIONS (internal to SVG) ── */
@keyframes arm-wave{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}
@keyframes leg-kick{0%,100%{transform:rotate(10deg)}50%{transform:rotate(-30deg)}}
@keyframes head-nod{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes tail-wag{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
@keyframes ear-bounce{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.15)}}
@keyframes skirt-sway{0%,100%{transform:skewX(0deg)}50%{transform:skewX(8deg)}}

.arm-l{transform-origin:top center;animation:arm-wave .6s ease-in-out infinite}
.arm-r{transform-origin:top center;animation:arm-wave .6s ease-in-out infinite reverse}
.leg-l{transform-origin:top center;animation:leg-kick .6s ease-in-out infinite}
.leg-r{transform-origin:top center;animation:leg-kick .6s ease-in-out infinite reverse}
.head{transform-origin:center bottom;animation:head-nod .6s ease-in-out infinite}
.tail{transform-origin:top left;animation:tail-wag .8s ease-in-out infinite}
.ear{transform-origin:bottom center;animation:ear-bounce .6s ease-in-out infinite}
.skirt{transform-origin:top center;animation:skirt-sway .6s ease-in-out infinite}

/* Companion dog */
#dogChar{
  position:absolute;bottom:8px;right:30%;
  display:none;flex-direction:column;align-items:center;
}
#dogChar.active{display:flex;animation:idle-bob 1s ease-in-out infinite .2s}
@keyframes dog-run{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px) scaleX(-1)}75%{transform:translateX(4px) scaleX(1)}}
#dogChar.move-run{animation:dog-run .4s ease-in-out infinite}

</style>

<script>
/* ═══════════════════════════════════════════════════
   ID3 / METADATA PARSER
═══════════════════════════════════════════════════ */
const MetaParser=(()=>{
  const D=new TextDecoder('utf-8');
  function u8(b,o){return new Uint8Array(b)[o]}
  function u32b(b,o){return new DataView(b).getUint32(o,false)}
  function u32l(b,o){return new DataView(b).getUint32(o,true)}
  function lat(bytes){return Array.from(bytes).map(b=>String.fromCharCode(b)).join('').replace(/\0/g,'')}
  function dstr(fd){
    if(!fd.length)return'';
    if(fd[0]===3)return D.decode(fd.slice(1)).replace(/\0/g,'').trim();
    if(fd[0]===1||fd[0]===0xFF){const s=fd[0]===1?fd.slice(1):fd;const u=new Uint16Array(s.buffer,s.byteOffset,Math.floor(s.length/2));return String.fromCharCode(...u).replace(/\0/g,'').trim();}
    return lat(fd.slice(1)).trim();
  }
  function ss(a,b,c,d){return((a&0x7F)<<21)|((b&0x7F)<<14)|((c&0x7F)<<7)|(d&0x7F)}
  function id3v2(buf){
    const b=new Uint8Array(buf);
    if(b[0]!==73||b[1]!==68||b[2]!==51)return null;
    const ver=b[3],fl=b[5],ts=ss(b[6],b[7],b[8],b[9])+10;
    let off=10;if(fl&0x40)off+=4+ss(b[10],b[11],b[12],b[13]);
    const m={};
    while(off+10<ts&&off+10<buf.byteLength){
      const id=lat(b.slice(off,off+4));if(!id.trim()||id==='\0\0\0\0')break;
      const fs=ver>=4?ss(b[off+4],b[off+5],b[off+6],b[off+7]):u32b(buf,off+4);
      if(fs<=0||off+10+fs>buf.byteLength)break;
      const fd=new Uint8Array(buf,off+10,fs);
      if(id==='TIT2')m.title=dstr(fd);
      else if(id==='TPE1')m.artist=m.artist||dstr(fd);
      else if(id==='TALB')m.album=dstr(fd);
      else if(id==='TYER'||id==='TDRC')m.year=dstr(fd).slice(0,4);
      else if(id==='TCON'){let g=dstr(fd);g=g.replace(/^\((\d+)\)/,(_,n)=>GENRES[+n]||g);m.genre=g;}
      else if(id==='APIC'&&!m.cover){let i=1;while(i<fd.length&&fd[i]!==0)i++;i++;i++;while(i<fd.length&&fd[i]!==0)i++;i++;m.cover=new Uint8Array(fd.buffer,fd.byteOffset+i,fd.length-i);}
      off+=10+fs;
    }
    return m;
  }
  function id3v1(buf){
    if(buf.byteLength<128)return null;
    const o=buf.byteLength-128,b=new Uint8Array(buf,o,3);
    if(b[0]!==84||b[1]!==65||b[2]!==71)return null;
    const t=(off,l)=>lat(new Uint8Array(buf,o+off,l)).trim();
    const m={title:t(3,30),artist:t(33,30),album:t(63,30),year:t(93,4)};
    const g=u8(buf,o+127);if(g<GENRES.length)m.genre=GENRES[g];
    return m;
  }
  function flac(buf){
    const b=new Uint8Array(buf);
    if(b[0]!==102||b[1]!==76||b[2]!==97||b[3]!==67)return null;
    const m={};let off=4;
    while(off+4<buf.byteLength){
      const bt=b[off]&0x7F,last=!!(b[off]&0x80),bs=(b[off+1]<<16)|(b[off+2]<<8)|b[off+3];
      off+=4;
      if(bt===4){const vl=u32l(buf,off);off+=4+vl;const cnt=u32l(buf,off);off+=4;
        for(let i=0;i<cnt;i++){const cl=u32l(buf,off);off+=4;const c=D.decode(new Uint8Array(buf,off,cl));off+=cl;const eq=c.indexOf('=');if(eq>0){const k=c.slice(0,eq).toUpperCase(),v=c.slice(eq+1);if(k==='TITLE')m.title=v;if(k==='ARTIST')m.artist=v;if(k==='ALBUM')m.album=v;if(k==='DATE'||k==='YEAR')m.year=v.slice(0,4);if(k==='GENRE')m.genre=v;}}
      }else if(bt===6&&!m.cover){let po=off;const ml=u32b(buf,po+4);po+=8+ml;const dl=u32b(buf,po);po+=4+dl;po+=16;const dn=u32b(buf,po);po+=4;m.cover=new Uint8Array(buf,po,dn);}
      off+=bs;if(last)break;
    }
    return Object.keys(m).length?m:null;
  }
  function m4a(buf){
    const m={};
    function ra(buf,off,end){
      while(off+8<end&&off<buf.byteLength){
        const sz=u32b(buf,off);if(sz<8)break;
        const nm=lat(new Uint8Array(buf,off+4,4));
        const body=off+8,next=off+sz;
        if(['moov','udta','ilst'].includes(nm))ra(buf,body,next);
        else if(nm==='meta')ra(buf,body+4,next);
        else{
          const MP={'\xa9nam':'title','\xa9ART':'artist','\xa9alb':'album','\xa9day':'year','\xa9gen':'genre'};
          if(MP[nm]){const v=rd(buf,body,next);if(v&&typeof v==='string')m[MP[nm]]=v;}
          if(nm==='covr'){const v=rd(buf,body,next);if(v instanceof Uint8Array)m.cover=v;}
        }
        off=next;
      }
    }
    function rd(buf,off,end){
      if(off+8>=end)return null;
      const sz=u32b(buf,off),tp=lat(new Uint8Array(buf,off+4,4));
      if(tp!=='data'||sz<16)return null;
      const dt=u32b(buf,off+8),ct=new Uint8Array(buf,off+16,sz-16);
      if(dt===1||dt===0)return D.decode(ct).replace(/\0/g,'').trim();
      if(dt===13||dt===14)return ct;
      return null;
    }
    ra(buf,0,buf.byteLength);
    return Object.keys(m).length?m:null;
  }
  const GENRES=['Blues','Classic Rock','Country','Dance','Disco','Funk','Grunge','Hip-Hop','Jazz','Metal','New Age','Oldies','Other','Pop','R&B','Rap','Reggae','Rock','Techno','Industrial','Alternative','Ska','Death Metal','Pranks','Soundtrack','Euro-Techno','Ambient','Trip-Hop','Vocal','Jazz+Funk','Fusion','Trance','Classical','Instrumental','Acid','House','Game','Sound Clip','Gospel','Noise','AlternRock','Bass','Soul','Punk','Space','Meditative','Instrumental Pop','Instrumental Rock','Ethnic','Gothic','Darkwave','Techno-Industrial','Electronic','Pop-Folk','Eurodance','Dream','Southern Rock','Comedy','Cult','Gangsta','Top 40','Christian Rap','Pop/Funk','Jungle','Native American','Cabaret','New Wave','Psychadelic','Rave','Showtunes','Trailer','Lo-Fi','Tribal','Acid Punk','Acid Jazz','Polka','Retro','Musical','Rock & Roll','Hard Rock'];
  async function parse(file){
    const sl=Math.min(file.size,512*1024);
    const hb=await file.slice(0,sl).arrayBuffer();
    const tb=await file.slice(Math.max(0,file.size-256)).arrayBuffer();
    const n=file.name.toLowerCase();
    let meta=null;
    if(n.endsWith('.flac'))meta=flac(hb);
    else if(n.endsWith('.m4a')||n.endsWith('.aac')||n.endsWith('.mp4'))meta=m4a(hb);
    else{meta=id3v2(hb);if(!meta?.title){const v=id3v1(tb);if(v?.title)meta={...meta,...v};}}
    if(!meta)meta={};
    if(meta.cover instanceof Uint8Array){
      const blob=new Blob([meta.cover]);
      meta.coverUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(blob);});
      delete meta.cover;
    }
    if(!meta.title)meta.title=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').replace(/^\d+[\s.-]+/,'').replace(/\b\w/g,c=>c.toUpperCase()).trim();
    if(!meta.artist)meta.artist='Unknown Artist';
    meta.album=meta.album||'';meta.genre=meta.genre||'';meta.year=meta.year||'';
    return meta;
  }
  return{parse};
})();

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const ST={idx:-1,playing:false,shuffle:false,repeat:false,vol:.85,liked:new Set()};
let LIBRARY=[];
function saveLib(){try{localStorage.setItem('cr_lib',JSON.stringify(LIBRARY.map(t=>({id:t.id,title:t.title,artist:t.artist,album:t.album,genre:t.genre,year:t.year,dur:t.dur,cover:t.cover,needsFile:true}))));}catch(e){}}
function loadLib(){try{LIBRARY=JSON.parse(localStorage.getItem('cr_lib')||'[]').map(t=>({...t,file:null,objectUrl:null,needsFile:true}));}catch(e){LIBRARY=[];}}

/* ═══════════════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════════════ */
const aud=new Audio();
aud.volume=.85;
let actx=null,analyser=null,wvData=null;
function ensureActx(){
  if(actx)return;
  try{actx=new(window.AudioContext||window.webkitAudioContext)();analyser=actx.createAnalyser();analyser.fftSize=512;wvData=new Uint8Array(analyser.frequencyBinCount);const s=actx.createMediaElementSource(aud);s.connect(analyser);analyser.connect(actx.destination);}catch(e){}
}
aud.addEventListener('timeupdate',()=>{
  if(!aud.duration)return;
  const p=aud.currentTime/aud.duration;
  document.getElementById('progFill').style.width=(p*100).toFixed(2)+'%';
  document.getElementById('mpFill').style.width=(p*100).toFixed(2)+'%';
  document.getElementById('tNow').textContent=ft(aud.currentTime);
});
aud.addEventListener('loadedmetadata',()=>{document.getElementById('tTot').textContent=ft(aud.duration);hideLoad();});
aud.addEventListener('waiting',showLoad);aud.addEventListener('playing',hideLoad);
aud.addEventListener('error',()=>{hideLoad();toast('Cannot play — re-add the file');});
aud.addEventListener('ended',()=>{ST.repeat?(aud.currentTime=0,aud.play()):nextTrk();});

/* ═══════════════════════════════════════════════════
   COLOR EXTRACTION
═══════════════════════════════════════════════════ */
function extractColor(coverDataUrl){
  if(!coverDataUrl){resetColors();return;}
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=8;c.height=8;
    const x=c.getContext('2d');x.drawImage(img,0,0,8,8);
    try{
      const d=x.getImageData(0,0,8,8).data;
      /* Find most saturated color */
      let bestR=255,bestG=60,bestB=120,bestSat=0;
      let avgR=0,avgG=0,avgB=0,n=0;
      for(let i=0;i<d.length;i+=4){
        if(d[i+3]<128)continue;
        const r=d[i],g=d[i+1],b=d[i+2];
        avgR+=r;avgG+=g;avgB+=b;n++;
        const max=Math.max(r,g,b),min=Math.min(r,g,b),sat=max-min;
        if(sat>bestSat&&max>60){bestSat=sat;bestR=r;bestG=g;bestB=b;}
      }
      if(n>0){avgR=Math.round(avgR/n);avgG=Math.round(avgG/n);avgB=Math.round(avgB/n);}
      /* Primary = most saturated, Secondary = avg shifted cool, Accent = complementary bright */
      const p=`${bestR},${bestG},${bestB}`;
      const s=`${Math.round(avgR*.4+100)},${Math.round(avgG*.5+120)},${Math.round(avgB*.4+150)}`;
      const aR=Math.min(255,255-bestR+120),aG=Math.min(255,255-bestG+180),aB=Math.max(0,bestB*.3+60);
      const a=`${aR},${aG},${aB}`;
      applyColors(p,s,a,coverDataUrl,avgR,avgG,avgB);
    }catch(e){resetColors();}
  };
  img.src=coverDataUrl;
}

function applyColors(p,s,a,coverDataUrl,avgR,avgG,avgB){
  document.documentElement.style.setProperty('--p',p);
  document.documentElement.style.setProperty('--s',s);
  document.documentElement.style.setProperty('--a',a);
  /* Cinematic BG */
  const bgArt=document.getElementById('bg-art');
  bgArt.style.backgroundImage=`url('${coverDataUrl}')`;
  bgArt.classList.add('loaded');
  /* Orb colors */
  document.getElementById('orb1').style.background=`rgba(${p},.3)`;
  document.getElementById('orb2').style.background=`rgba(${s},.25)`;
}

function resetColors(){
  document.documentElement.style.setProperty('--p','255,60,120');
  document.documentElement.style.setProperty('--s','80,200,255');
  document.documentElement.style.setProperty('--a','220,255,80');
  document.getElementById('bg-art').classList.remove('loaded');
}

/* ═══════════════════════════════════════════════════
   ADD FILES
═══════════════════════════════════════════════════ */
const audioExts=/\.(mp3|flac|wav|aac|ogg|m4a|opus|wma|aiff|ape)$/i;

async function addFiles(fileList){
  if(!fileList||!fileList.length)return;
  const files=Array.from(fileList).filter(f=>audioExts.test(f.name)||f.type.startsWith('audio/'));
  if(!files.length){toast('No audio files found');return;}
  hideAddMenu();
  showProc(`Reading 1 / ${files.length}`);
  let added=0;
  for(let i=0;i<files.length;i++){
    const file=files[i];
    document.getElementById('procTxt').textContent=`Reading ${i+1} / ${files.length}`;
    if(LIBRARY.find(t=>t.file?.name===file.name&&!t.needsFile))continue;
    let meta={};
    try{meta=await MetaParser.parse(file);}catch(e){}
    const objectUrl=URL.createObjectURL(file);
    let dur=0;
    try{dur=await new Promise(r=>{const a=new Audio();a.preload='metadata';a.onloadedmetadata=()=>{r(a.duration||0);a.src='';};a.onerror=()=>r(0);a.src=objectUrl;setTimeout(()=>r(0),3000);});}catch(e){}
    LIBRARY.push({id:Math.random().toString(36).slice(2),title:meta.title,artist:meta.artist,album:meta.album,genre:meta.genre,year:meta.year,dur,cover:meta.coverUrl||'',file,objectUrl,needsFile:false});
    added++;
    if(added===1&&meta.coverUrl)extractColor(meta.coverUrl);
  }
  hideProc();saveLib();
  renderLib(document.getElementById('srch').value);
  if(added>0){toast(`${added} track${added===1?'':'s'} added`);if(ST.idx<0){const fi=LIBRARY.findIndex(t=>t.objectUrl);if(fi>=0)loadIdx(fi,false);}}
  else toast('No new tracks added');
}

/* ═══════════════════════════════════════════════════
   LOAD TRACK
═══════════════════════════════════════════════════ */
function loadIdx(idx,play=true){
  if(!LIBRARY.length)return;
  idx=((idx%LIBRARY.length)+LIBRARY.length)%LIBRARY.length;
  ST.idx=idx;
  const t=LIBRARY[idx];
  if(t.needsFile||!t.objectUrl){
    document.getElementById('tTitle').textContent=t.title||'—';
    document.getElementById('tArtist').textContent=t.artist||'—';
    document.getElementById('mpT').textContent=t.title||'—';
    document.getElementById('mpA').textContent=t.artist||'—';
    setPlaying(false);toast('Tap Add to re-select this file');renderLib();return;
  }
  /* Art */
  const art=t.cover||'';
  document.getElementById('artImg').src=art;
  document.getElementById('mpArt').src=art;
  document.getElementById('bg-art').style.backgroundImage=art?`url('${art}')`:'none';
  if(art){document.getElementById('bg-art').classList.add('loaded');extractColor(art);}
  else resetColors();
  /* Meta */
  document.getElementById('tTitle').textContent=t.title||'Unknown';
  document.getElementById('tArtist').textContent=t.artist||'Unknown Artist';
  document.getElementById('tAlbum').textContent=t.album||'';
  document.getElementById('mpT').textContent=t.title||'Unknown';
  document.getElementById('mpA').textContent=t.artist||'Unknown Artist';
  document.getElementById('trkNumBg').textContent=String(idx+1).padStart(2,'0');
  /* Chips */
  const chips=[];
  if(t.genre)chips.push(`<span class="tchip">${esc(t.genre)}</span>`);
  if(t.year)chips.push(`<span class="tchip">${esc(t.year)}</span>`);
  document.getElementById('tChips').innerHTML=chips.join('');
  /* Like */
  document.getElementById('btnLike').classList.toggle('on',ST.liked.has(idx));
  document.getElementById('tTot').textContent=ft(t.dur||0);
  document.getElementById('progFill').style.width='0%';
  document.getElementById('tNow').textContent='0:00';
  /* Audio */
  showLoad();aud.src=t.objectUrl;aud.load();
  if(play){
    ensureActx();
    if(actx&&actx.state==='suspended')actx.resume();
    aud.play().then(()=>setPlaying(true)).catch(()=>{hideLoad();toast('Tap play to start');});
  }else setPlaying(false);
  renderLib(document.getElementById('srch').value);
}

/* ═══════════════════════════════════════════════════
   PLAYBACK
═══════════════════════════════════════════════════ */
function togglePlay(){
  ensureActx();
  if(actx&&actx.state==='suspended')actx.resume();
  if(ST.idx<0){const fi=LIBRARY.findIndex(t=>t.objectUrl&&!t.needsFile);if(fi>=0)loadIdx(fi);else toast('Add files first');return;}
  const t=LIBRARY[ST.idx];
  if(t.needsFile||!t.objectUrl){toast('Re-add this file to play');return;}
  aud.paused?aud.play().then(()=>setPlaying(true)).catch(()=>{}):( aud.pause(),setPlaying(false));
}
function setPlaying(v){
  ST.playing=v;
  document.getElementById('app').classList.toggle('playing',v);
  const pi='<rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/>';
  const pp='<polygon points="5,3 19,12 5,21"/>';
  document.getElementById('playIco').innerHTML=v?pi:pp;
  document.getElementById('mpIco').innerHTML=v?pi:pp;
}
function nextTrk(){
  if(!LIBRARY.length)return;
  if(ST.shuffle){const av=LIBRARY.filter(t=>t.objectUrl&&!t.needsFile);if(av.length)loadIdx(LIBRARY.indexOf(av[Math.floor(Math.random()*av.length)]));}
  else loadIdx((ST.idx+1)%LIBRARY.length);
}
function prevTrk(){if(aud.currentTime>4){aud.currentTime=0;return;}loadIdx((ST.idx-1+LIBRARY.length)%LIBRARY.length);}
function togShuffle(){ST.shuffle=!ST.shuffle;['btnShuffle','ctrlShuffle'].forEach(id=>document.getElementById(id)?.classList.toggle('on',ST.shuffle));toast(ST.shuffle?'Shuffle on':'Shuffle off');}
function togRepeat(){ST.repeat=!ST.repeat;['btnRepeat','ctrlRepeat'].forEach(id=>document.getElementById(id)?.classList.toggle('on',ST.repeat));toast(ST.repeat?'Repeat on':'Repeat off');}
function togLike(){if(ST.idx<0)return;ST.liked.has(ST.idx)?ST.liked.delete(ST.idx):ST.liked.add(ST.idx);document.getElementById('btnLike').classList.toggle('on',ST.liked.has(ST.idx));toast(ST.liked.has(ST.idx)?'Liked':'Unliked');}
function setVol(v){ST.vol=+v/100;aud.volume=ST.vol;document.getElementById('vv').textContent=v;document.getElementById('volSl').style.setProperty('--p2',v);}
setVol(85);

/* ═══════════════════════════════════════════════════
   SEEKING
═══════════════════════════════════════════════════ */
function doSeek(p){if(!aud.duration)return;aud.currentTime=p*aud.duration;document.getElementById('progFill').style.width=(p*100).toFixed(2)+'%';document.getElementById('tNow').textContent=ft(aud.currentTime);}
function seekC(e){const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));}
function seekT(e){e.preventDefault();const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.touches[0].clientX-r.left)/r.width)));}
function wvSeek(e){const r=e.currentTarget.getBoundingClientRect();doSeek(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));}

/* ═══════════════════════════════════════════════════
   WAVEFORM — uses real frequency analyser data
═══════════════════════════════════════════════════ */
let wvT=0;
function drawWave(){
  const cvs=document.getElementById('wvCvs');
  const W=cvs.offsetWidth||390;
  if(cvs.width!==W){cvs.width=W;cvs.height=52;}
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,W,52);

  /* Get CSS color vars */
  const cs=getComputedStyle(document.documentElement);
  const pc=cs.getPropertyValue('--p').trim()||'255,60,120';
  const ac=cs.getPropertyValue('--a').trim()||'220,255,80';
  const prog=aud.duration?aud.currentTime/aud.duration:0;

  if(analyser&&ST.playing){
    analyser.getByteFrequencyData(wvData);
    /* Frequency bar visualizer */
    const bars=64;
    const bw=W/bars;
    for(let i=0;i<bars;i++){
      const v=wvData[Math.floor(i*wvData.length/bars)]/255;
      const h=4+v*46;
      const x=i*bw;
      const played=x/W<=prog;
      const alpha=played?.9:.25;
      /* Gradient from primary to accent based on frequency */
      const t2=i/bars;
      const r1=parseInt(pc.split(',')[0]),g1=parseInt(pc.split(',')[1]),b1=parseInt(pc.split(',')[2]);
      const r2=parseInt(ac.split(',')[0]),g2=parseInt(ac.split(',')[1]),b2=parseInt(ac.split(',')[2]);
      const r=Math.round(r1+(r2-r1)*t2),g=Math.round(g1+(g2-g1)*t2),b=Math.round(b1+(b2-b1)*t2);
      ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
      ctx.fillRect(x+1,52-h,bw-2,h);
    }
  }else{
    /* Idle sine wave */
    const amp=ST.playing?14:5;
    ctx.beginPath();
    for(let x=0;x<W;x++){
      const y=26+Math.sin(x*.04+wvT*.06)*amp+Math.sin(x*.09-wvT*.04)*amp*.4;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    const g2=ctx.createLinearGradient(0,0,W,0);
    g2.addColorStop(0,`rgba(${pc},.08)`);
    g2.addColorStop(Math.max(0,Math.min(1,prog)),`rgba(${pc},.7)`);
    g2.addColorStop(Math.min(1,prog+.01),`rgba(${ac},.2)`);
    g2.addColorStop(1,`rgba(${ac},.08)`);
    ctx.strokeStyle=g2;ctx.lineWidth=1.5;ctx.stroke();
  }
  wvT+=ST.playing?.06:.015;
}
setInterval(drawWave,33);

/* ═══════════════════════════════════════════════════
   LIBRARY RENDER
═══════════════════════════════════════════════════ */
function renderLib(q=''){
  const list=document.getElementById('trkList');
  const q2=q.toLowerCase();
  const rows=LIBRARY.map((t,i)=>({t,i})).filter(({t})=>!q2||(t.title+t.artist+(t.album||'')).toLowerCase().includes(q2));
  if(!LIBRARY.length){
    list.innerHTML=`<div class="lib-empty">
      <div class="lib-empty-icon">♪</div>
      <p>Your library is empty.<br>Add music from your computer or NAS.</p>
      <button class="lib-empty-btn" onclick="togAddMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        ADD FILES
      </button>
    </div>`;
    return;
  }
  if(!rows.length){list.innerHTML=`<div class="lib-empty"><p>No results for "${esc(q)}"</p></div>`;return;}
  list.innerHTML=rows.map(({t,i},ri)=>{
    const isOn=i===ST.idx;
    const nf=t.needsFile||!t.objectUrl;
    const numEl=isOn&&ST.playing
      ?'<div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>'
      :`<span style="font-family:var(--display);font-size:13px">${String(i+1).padStart(2,'0')}</span>`;
    return`<div class="trk${isOn?' on':''}${nf?' trk-dim':''}" onclick="loadIdx(${i})" style="animation-delay:${ri*15}ms;${nf?'opacity:.4':''}">
      <div class="trk-num playing-ic">${numEl}</div>
      <img class="trk-art" src="${t.cover||''}" alt="" onerror="this.style.visibility='hidden'">
      <div class="trk-info">
        <div class="trk-name">${esc(t.title||'Unknown')}</div>
        <div class="trk-meta">${esc(t.artist||'Unknown')}${t.album?' · '+esc(t.album):''}${nf?' · <em style="opacity:.6;font-style:normal">re-add file</em>':''}</div>
      </div>
      <div class="trk-dur">${ft(t.dur||0)}</div>
      <button class="trk-del" onclick="event.stopPropagation();removeTrk(${i})" title="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('');
}

function removeTrk(i){
  if(LIBRARY[i].objectUrl)URL.revokeObjectURL(LIBRARY[i].objectUrl);
  LIBRARY.splice(i,1);
  if(ST.idx===i){aud.pause();setPlaying(false);ST.idx=-1;}
  else if(ST.idx>i)ST.idx--;
  saveLib();renderLib(document.getElementById('srch').value);
}

═══════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')aud.currentTime=Math.min(aud.duration||0,aud.currentTime+10);
  if(e.code==='ArrowLeft')aud.currentTime=Math.max(0,aud.currentTime-10);
  if(e.code==='KeyN')nextTrk();if(e.code==='KeyP')prevTrk();
});

/* ═══════════════════════════════════════════════════
   CHARACTER CONTROLLER
═══════════════════════════════════════════════════ */
const CHARS = ['charJakara','charSpyra','charCrashina','charSonia','charMarie','charTinette'];
const MOVES = ['move-bounce','move-spin','move-freeze','move-windmill','move-toprock','move-headspin'];
// Daxa always shows with Jakara; Milou always shows with Tinette
let activeCharIdx = 0;
let charTimer = null;
let moveTimer = null;

function showChar(idx){
  CHARS.forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el){
      el.classList.toggle('active',i===idx);
      // Remove all move classes when hiding
      if(i!==idx){MOVES.forEach(m=>el.classList.remove(m));el.classList.add('move-idle');}
    }
  });
  // Daxa shown with Jakara
  const daxa=document.getElementById('charDaxa');
  if(daxa)daxa.classList.toggle('active',idx===0);
  // Milou shown with Tinette
  const dog=document.getElementById('dogChar');
  if(dog)dog.classList.toggle('active',idx===5);
  activeCharIdx=idx;
}

function applyMove(charEl, move){
  MOVES.forEach(m=>charEl.classList.remove(m));
  charEl.classList.remove('move-idle');
  charEl.classList.add(move);
}

function startCharShow(){
  if(charTimer)return; // already running
  showChar(activeCharIdx);
  // Cycle characters every 8 seconds
  charTimer=setInterval(()=>{
    const next=(activeCharIdx+1)%CHARS.length;
    showChar(next);
    cycleMoves();
  },8000);
  cycleMoves();
}

function stopCharShow(){
  clearInterval(charTimer);clearInterval(moveTimer);
  charTimer=null;moveTimer=null;
  // Set all to idle
  CHARS.forEach(id=>{
    const el=document.getElementById(id);
    if(el){MOVES.forEach(m=>el.classList.remove(m));el.classList.add('move-idle');}
  });
}

function cycleMoves(){
  clearInterval(moveTimer);
  const applyRandom=()=>{
    const el=document.getElementById(CHARS[activeCharIdx]);
    if(el&&ST.playing){
      const move=MOVES[Math.floor(Math.random()*MOVES.length)];
      applyMove(el,move);
    }
  };
  applyRandom();
  moveTimer=setInterval(applyRandom,2000);
}

// Hook into setPlaying
const _origSetPlaying=setPlaying;
function setPlaying(v){
  _origSetPlaying(v);
  if(v){startCharShow();}
  else{stopCharShow();}
}

// Init — show first char idle
showChar(0);
